<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>KaomojiMarkdownDesign — ASCII Wireframe Editor</title>
<style>
/* === Reset & Base === */
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
html, body { height: 100%; overflow: hidden; }
body {
    font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
    font-size: 13px;
    background: #1e1e2e;
    color: #cdd6f4;
    display: flex;
    flex-direction: column;
}

/* === Toolbar === */
#toolbar {
    display: flex;
    align-items: center;
    height: 40px;
    background: #11111b;
    border-bottom: 1px solid #313244;
    padding: 0 12px;
    gap: 8px;
    flex-shrink: 0;
    user-select: none;
}
#toolbar .logo {
    font-weight: 700;
    font-size: 14px;
    color: #cba6f7;
    margin-right: 16px;
    white-space: nowrap;
}
#toolbar .spacer { flex: 1; }
.toolbar-btn {
    background: #313244;
    border: 1px solid #45475a;
    color: #cdd6f4;
    padding: 4px 12px;
    border-radius: 4px;
    font-size: 12px;
    cursor: pointer;
    white-space: nowrap;
}
.toolbar-btn:hover { background: #45475a; }
.toolbar-btn.primary { background: #89b4fa; color: #1e1e2e; border-color: #89b4fa; }
.toolbar-btn.primary:hover { background: #b4befe; }

/* === Main Layout === */
#main {
    display: flex;
    flex: 1;
    overflow: hidden;
}

/* === Left Panel === */
#left-panel {
    width: 160px;
    background: #1e1e2e;
    border-right: none;
    display: flex;
    flex-direction: column;
    overflow-y: auto;
    flex-shrink: 0;
    user-select: none;
}

/* === Resizable Splitters === */
.panel-splitter {
    width: 4px;
    background: #313244;
    cursor: col-resize;
    flex-shrink: 0;
    transition: background 0.15s;
}
.panel-splitter:hover, .panel-splitter.active {
    background: #89b4fa;
}
.panel-section {
    border-bottom: 1px solid #313244;
}
.panel-header {
    font-size: 10px;
    font-weight: 600;
    text-transform: uppercase;
    letter-spacing: 0.08em;
    color: #6c7086;
    padding: 8px 10px 4px;
}
.panel-item {
    display: flex;
    align-items: center;
    gap: 6px;
    padding: 5px 10px;
    cursor: pointer;
    font-size: 12px;
    color: #cdd6f4;
}
.panel-item:hover { background: #313244; }
.panel-item.active { background: #45475a; color: #89b4fa; }
.panel-item .icon {
    width: 18px;
    text-align: center;
    font-family: "Courier New", monospace;
    font-size: 13px;
}
.panel-item .shortcut {
    margin-left: auto;
    font-size: 10px;
    color: #6c7086;
}
.elem-item {
    display: flex;
    align-items: center;
    gap: 6px;
    padding: 4px 10px;
    cursor: grab;
    font-size: 12px;
    color: #cdd6f4;
}
.elem-item:hover { background: #313244; }
.elem-item .preview {
    font-family: "Courier New", monospace;
    font-size: 11px;
    color: #a6adc8;
    white-space: nowrap;
}

/* === Canvas Area === */
#canvas-area {
    flex: 1;
    overflow: auto;
    background: #11111b;
    display: flex;
    align-items: flex-start;
    justify-content: flex-start;
    padding: 16px;
    position: relative;
}
#grid-canvas {
    cursor: crosshair;
    image-rendering: pixelated;
}

/* === Right Panel === */
#right-panel {
    width: 200px;
    background: #1e1e2e;
    border-left: none;
    display: flex;
    flex-direction: column;
    overflow-y: auto;
    flex-shrink: 0;
    user-select: none;
}
.prop-row {
    display: flex;
    align-items: center;
    padding: 4px 10px;
    gap: 6px;
}
.prop-label {
    font-size: 11px;
    color: #6c7086;
    width: 50px;
    flex-shrink: 0;
}
.prop-input {
    flex: 1;
    background: #313244;
    border: 1px solid #45475a;
    color: #cdd6f4;
    padding: 3px 6px;
    border-radius: 3px;
    font-size: 12px;
    font-family: "Courier New", monospace;
}
.prop-input:focus { outline: none; border-color: #89b4fa; }
.prop-select {
    flex: 1;
    background: #313244;
    border: 1px solid #45475a;
    color: #cdd6f4;
    padding: 3px 6px;
    border-radius: 3px;
    font-size: 12px;
}
.prop-select:focus { outline: none; border-color: #89b4fa; }

/* Layer items */
.layer-item {
    display: flex;
    align-items: center;
    gap: 6px;
    padding: 5px 10px;
    cursor: pointer;
    font-size: 12px;
}
.layer-item:hover { background: #313244; }
.layer-item.selected { background: #45475a; }
.layer-item .vis-toggle {
    cursor: pointer;
    font-size: 10px;
    width: 14px;
    text-align: center;
}
.layer-item .layer-name {
    flex: 1;
    white-space: nowrap;
    overflow: hidden;
    text-overflow: ellipsis;
}
.layer-item .layer-actions {
    display: flex;
    gap: 2px;
}
.layer-btn {
    background: none;
    border: none;
    color: #6c7086;
    cursor: pointer;
    font-size: 11px;
    padding: 1px 3px;
    border-radius: 2px;
}
.layer-btn:hover { color: #cdd6f4; background: #45475a; }

/* === Status Bar === */
#statusbar {
    display: flex;
    align-items: center;
    height: 24px;
    background: #11111b;
    border-top: 1px solid #313244;
    padding: 0 12px;
    font-size: 11px;
    color: #a6adc8;
    gap: 16px;
    flex-shrink: 0;
    user-select: none;
}
.status-item { white-space: nowrap; }

/* === Toast Notification === */
.toast {
    position: fixed;
    bottom: 40px;
    left: 50%;
    transform: translateX(-50%);
    background: #313244;
    color: #cdd6f4;
    padding: 8px 16px;
    border-radius: 6px;
    font-size: 12px;
    z-index: 9999;
    opacity: 0;
    transition: opacity 0.3s;
    pointer-events: none;
}
.toast.show { opacity: 1; }

/* === Inline Text Edit === */
#inline-editor {
    position: absolute;
    display: none;
    background: #181825;
    border: 1px solid #89b4fa;
    color: #cdd6f4;
    font-family: "Courier New", "Courier", monospace;
    padding: 0;
    outline: none;
    resize: none;
    overflow: hidden;
    z-index: 100;
    caret-color: #f5c2e7;
}

/* Scrollbar styling */
::-webkit-scrollbar { width: 8px; height: 8px; }
::-webkit-scrollbar-track { background: #1e1e2e; }
::-webkit-scrollbar-thumb { background: #45475a; border-radius: 4px; }
::-webkit-scrollbar-thumb:hover { background: #585b70; }
</style>
</head>
<body>

<!-- Toolbar -->
<div id="toolbar">
    <span class="logo">◆ KaomojiMarkdownDesign</span>
    <div class="spacer"></div>
    <button class="toolbar-btn primary" id="btn-copy-md" title="Copy as Markdown (Ctrl+Shift+C)">Copy</button>
    <button class="toolbar-btn" id="btn-paste-md" title="Paste Markdown from clipboard (Ctrl+Shift+V)">Paste</button>
    <button class="toolbar-btn" id="btn-undo" title="Undo (Ctrl+Z)">Undo</button>
    <button class="toolbar-btn" id="btn-redo" title="Redo (Ctrl+Shift+Z)">Redo</button>
    <button class="toolbar-btn" id="btn-save" title="Save to file (Ctrl+S)">Save</button>
    <button class="toolbar-btn" id="btn-load" title="Load from file">Load</button>
    <button class="toolbar-btn" id="btn-new" title="Clear canvas (Ctrl+N)">Refresh</button>
</div>

<!-- Main area -->
<div id="main">
    <!-- Left panel: tools + elements -->
    <div id="left-panel">
        <div class="panel-section" id="tools-section">
            <div class="panel-header">Tools</div>
        </div>
        <div class="panel-section" id="elements-section">
            <div class="panel-header">Elements</div>
        </div>
    </div>

    <!-- Left splitter -->
    <div class="panel-splitter" id="left-splitter"></div>

    <!-- Canvas -->
    <div id="canvas-area">
        <canvas id="grid-canvas"></canvas>
        <textarea id="inline-editor" spellcheck="false"></textarea>
    </div>

    <!-- Right splitter -->
    <div class="panel-splitter" id="right-splitter"></div>

    <!-- Right panel: inspector + layers -->
    <div id="right-panel">
        <div class="panel-section" id="inspector-section">
            <div class="panel-header">Inspector</div>
            <div id="inspector-content">
                <div style="padding: 10px; color: #6c7086; font-size: 11px;">No selection</div>
            </div>
        </div>
        <div class="panel-section" id="layers-section">
            <div class="panel-header">Layers</div>
            <div id="layers-content"></div>
        </div>
    </div>
</div>

<!-- Status bar -->
<div id="statusbar">
    <span class="status-item" id="status-pos">Ln 1, Col 1</span>
    <span class="status-item" id="status-grid">80×40</span>
    <span class="status-item" id="status-count">Components: 0</span>
    <span class="status-item" id="status-tool">Select</span>
</div>

<!-- Toast -->
<div class="toast" id="toast"></div>

<!-- Scripts (in dependency order) -->

<script src="components/textbox.js"></script>
<script src="components/box.js"></script>
<script src="components/button.js"></script>
<script src="components/input.js"></script>
<script src="components/line.js"></script>
<script src="components/arrow.js"></script>
<script src="components/card.js"></script>
<script src="components/table.js"></script>
<script src="components/modal.js"></script>
<script src="components/tabs.js"></script>
<script src="components/navbar.js"></script>
<script src="components/dropdown.js"></script>
<script src="components/search.js"></script>
<script src="components/checkbox.js"></script>
<script src="components/radio.js"></script>
<script src="components/toggle.js"></script>
<script src="components/progress.js"></script>
<script src="components/breadcrumb.js"></script>
<script src="components/pagination.js"></script>
<script src="components/separator.js"></script>
<script src="components/circle.js"></script>

</body>
</html>
