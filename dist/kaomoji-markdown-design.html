// --- tools/base.js ---
// === BaseTool: interface for all tools ===

class BaseTool {
    constructor(name, app) {
        this.name = name;
        this.app = app;
    }

    // Called when tool is activated
    activate() {}

    // Called when tool is deactivated
    deactivate() {}

    // Mouse event handlers (col/row are grid coordinates)
    onMouseDown(col, row, e) {}
    onMouseMove(col, row, e) {}
    onMouseUp(col, row, e) {}

    // Called each frame to provide overlay data
    getOverlays() { return {}; }

    // Get cursor style
    getCursor() { return 'crosshair'; }
}

// --- tools/select.js ---
// === Select Tool: click to select, drag to move, handles to resize ===

class SelectTool extends BaseTool {
    constructor(app) {
        super('select', app);
        this._dragging = false;
        this._resizing = false;
        this._resizeDir = null;
        this._startCol = 0;
        this._startRow = 0;
        this._origX = 0;
        this._origY = 0;
        this._origW = 0;
        this._origH = 0;
        this._origPositions = new Map(); // for multi-drag: id → {x, y}
        this._marquee = null;
    }

    activate() {
        this._dragging = false;
        this._resizing = false;
        this._marquee = null;
    }

    deactivate() {
        this._dragging = false;
        this._resizing = false;
        this._marquee = null;
    }

    onMouseDown(col, row, e) {
        const app = this.app;

        // Check resize handles — only when exactly 1 selected
        const single = app.selectedComponent; // getter: null if != 1
        if (single && !single.locked) {
            const handleDir = single.getHandleAt(col, row);
            if (handleDir) {
                this._resizing = true;
                this._resizeDir = handleDir;
                this._startCol = col;
                this._startRow = row;
                this._origX = single.x;
                this._origY = single.y;
                this._origW = single.w;
                this._origH = single.h;
                app.pushUndo();
                return;
            }
        }

        // Hit test: find topmost component under cursor
        const hit = app.hitTest(col, row);

        if (hit && e.shiftKey) {
            // Shift+click: toggle selection
            app.toggleSelect(hit);
            // Start dragging if the component is now selected and unlocked
            if (app.isSelected(hit) && !hit.locked) {
                this._startMultiDrag(col, row);
            }
            return;
        }

        if (hit) {
            // If not already selected, replace selection
            if (!app.isSelected(hit)) {
                app.selectComponent(hit);
            }
            if (!hit.locked) {
                this._startMultiDrag(col, row);
            }
        } else {
            // Click on empty space
            if (!e.shiftKey) {
                app.selectComponent(null);
            }
            this._marquee = { x1: col, y1: row, x2: col, y2: row };
        }
    }

    _startMultiDrag(col, row) {
        this._dragging = true;
        this._startCol = col;
        this._startRow = row;
        this._origPositions.clear();
        for (const comp of this.app.getSelectedComponents()) {
            this._origPositions.set(comp.id, { x: comp.x, y: comp.y });
        }
        this.app.pushUndo();
    }

    onMouseMove(col, row, e) {
        const app = this.app;

        if (this._resizing) {
            const single = app.selectedComponent;
            if (single) {
                const dx = col - this._startCol;
                const dy = row - this._startRow;
                const min = single.getMinSize();
                this._applyResize(single, dx, dy, min);
                app.render();
            }
            return;
        }

        if (this._dragging) {
            const dx = col - this._startCol;
            const dy = row - this._startRow;
            for (const comp of app.getSelectedComponents()) {
                if (comp.locked) continue;
                const orig = this._origPositions.get(comp.id);
                if (!orig) continue;
                const newX = Math.max(0, Math.min(GRID_COLS - comp.w, orig.x + dx));
                const newY = Math.max(0, Math.min(GRID_ROWS - comp.h, orig.y + dy));
                // Shift group children by the same delta
                if (comp.type === 'group' && comp.children) {
                    const shiftX = newX - comp.x;
                    const shiftY = newY - comp.y;
                    for (const child of comp.children) {
                        child.x += shiftX;
                        child.y += shiftY;
                    }
                }
                comp.x = newX;
                comp.y = newY;
            }
            app.render();
            return;
        }

        if (this._marquee) {
            this._marquee.x2 = col;
            this._marquee.y2 = row;
            app.render();
        }
    }

    onMouseUp(col, row, e) {
        if (this._marquee) {
            // Select all components within marquee rectangle
            const mx = Math.min(this._marquee.x1, this._marquee.x2);
            const my = Math.min(this._marquee.y1, this._marquee.y2);
            const mw = Math.abs(this._marquee.x2 - this._marquee.x1);
            const mh = Math.abs(this._marquee.y2 - this._marquee.y1);
            if (mw > 1 || mh > 1) {
                const hits = this.app.components.filter(c =>
                    c.visible && c.name !== '_freehand' &&
                    c.x >= mx && c.y >= my &&
                    c.x + c.w <= mx + mw + 1 && c.y + c.h <= my + mh + 1
                );
                if (hits.length > 0) {
                    if (e.shiftKey) {
                        // Shift+marquee: add to existing selection
                        for (const h of hits) {
                            this.app.selectedComponents.add(h.id);
                        }
                        this.app._updateSelectionUI();
                    } else {
                        this.app.selectMultiple(hits);
                    }
                }
            }
            this._marquee = null;
        }
        this._dragging = false;
        this._resizing = false;
        this._resizeDir = null;
        this._origPositions.clear();
        this.app.render();
    }

    _applyResize(comp, dx, dy, min) {
        const dir = this._resizeDir;
        let x = this._origX, y = this._origY, w = this._origW, h = this._origH;

        if (dir.includes('e')) { w = Math.max(min.minW, this._origW + dx); }
        if (dir.includes('w')) { w = Math.max(min.minW, this._origW - dx); x = this._origX + this._origW - w; }
        if (dir.includes('s')) { h = Math.max(min.minH, this._origH + dy); }
        if (dir.includes('n')) { h = Math.max(min.minH, this._origH - dy); y = this._origY + this._origH - h; }

        // Clamp to grid
        x = Math.max(0, x);
        y = Math.max(0, y);
        if (x + w > GRID_COLS) w = GRID_COLS - x;
        if (y + h > GRID_ROWS) h = GRID_ROWS - y;

        // Shift group children when position changes (n/w resize)
        if (comp.type === 'group' && comp.children) {
            const shiftX = x - comp.x;
            const shiftY = y - comp.y;
            if (shiftX !== 0 || shiftY !== 0) {
                for (const child of comp.children) {
                    child.x += shiftX;
                    child.y += shiftY;
                }
            }
        }

        comp.x = x;
        comp.y = y;
        comp.w = w;
        comp.h = h;
    }

    getOverlays() {
        const overlays = {};
        const selectedComps = this.app.getSelectedComponents();

        if (selectedComps.length > 0) {
            // Draw selection rect for each selected component
            overlays.selections = selectedComps.map(c => c.getBounds());

            // Only show resize handles for single selection
            if (selectedComps.length === 1 && !selectedComps[0].locked) {
                overlays.handles = selectedComps[0].getHandles();
            }
        }

        if (this._marquee) {
            const x = Math.min(this._marquee.x1, this._marquee.x2);
            const y = Math.min(this._marquee.y1, this._marquee.y2);
            overlays.selectionRect = {
                x, y,
                w: Math.abs(this._marquee.x2 - this._marquee.x1) + 1,
                h: Math.abs(this._marquee.y2 - this._marquee.y1) + 1,
            };
        }
        return overlays;
    }

    getCursor() { return 'default'; }
}

// --- tools/text.js ---
// === Text Tool: click to place a textbox and start editing ===

class TextTool extends BaseTool {
    constructor(app) {
        super('text', app);
    }

    onMouseDown(col, row, e) {
        const app = this.app;

        // If clicking on an existing text component, select and edit it
        const hit = app.hitTest(col, row);
        if (hit && hit.props.text !== undefined) {
            app.selectComponent(hit);
            const rect = app.canvas.getBoundingClientRect();
            const px = e.clientX - rect.left;
            const py = e.clientY - rect.top;
            app._startInlineEdit(hit, px, py);
            return;
        }

        // Create a new textbox at click position
        app.pushUndo();
        const comp = ComponentRegistry.create('textbox', col, row, {});
        comp.zIndex = app.components.length;
        app.components.push(comp);
        app.selectComponent(comp);
        app.render();

        // Immediately open inline editor
        const rect = app.canvas.getBoundingClientRect();
        const px = comp.x * app.renderer.charWidth + rect.left;
        const py = comp.y * app.renderer.charHeight + rect.top;
        app._startInlineEdit(comp, px - rect.left, py - rect.top);
    }

    getCursor() { return 'text'; }
}

// --- tools/line.js ---
// === Line Tool: click-drag to draw lines/arrows at any angle ===

class LineTool extends BaseTool {
    constructor(app, isArrow) {
        super(isArrow ? 'arrow' : 'line', app);
        this._isArrow = isArrow;
        this._drawing = false;
        this._startCol = 0;
        this._startRow = 0;
        this._endCol = 0;
        this._endRow = 0;
        this._preview = null;
    }

    activate() {
        this._drawing = false;
        this._preview = null;
    }

    deactivate() {
        this._drawing = false;
        this._preview = null;
    }

    onMouseDown(col, row, e) {
        this._drawing = true;
        this._startCol = col;
        this._startRow = row;
        this._endCol = col;
        this._endRow = row;
        this._updatePreview();
        this.app.render();
    }

    onMouseMove(col, row, e) {
        if (!this._drawing) return;
        this._endCol = col;
        this._endRow = row;
        this._updatePreview();
        this.app.render();
    }

    onMouseUp(col, row, e) {
        if (!this._drawing) return;
        this._drawing = false;
        this._endCol = col;
        this._endRow = row;
        this._updatePreview();

        if (!this._preview) {
            this._preview = null;
            this.app.render();
            return;
        }

        const p = this._preview;
        const type = this._isArrow ? 'arrow' : 'line';
        const props = { flipped: p.flipped };
        if (this._isArrow) {
            props.reversed = p.reversed;
        }

        this.app.pushUndo();
        const comp = ComponentRegistry.create(type, p.x, p.y, props);
        comp.w = p.w;
        comp.h = p.h;
        comp.zIndex = this.app.components.length;
        this.app.components.push(comp);
        this.app.selectComponent(comp);
        this.app._toast(`Added ${type}`);

        this._preview = null;
        this.app.setTool('select');
    }

    _updatePreview() {
        const dx = this._endCol - this._startCol;
        const dy = this._endRow - this._startRow;
        const absDx = Math.abs(dx);
        const absDy = Math.abs(dy);

        if (absDx < 1 && absDy < 1) {
            this._preview = null;
            return;
        }

        const x = Math.min(this._startCol, this._endCol);
        const y = Math.min(this._startRow, this._endRow);
        const w = Math.max(1, absDx + 1);
        const h = Math.max(1, absDy + 1);

        // flipped = TR→BL (dx and dy have opposite signs)
        const flipped = (dx > 0 && dy < 0) || (dx < 0 && dy > 0);

        // reversed = arrowhead at Bresenham start instead of end
        const eRelX = this._endCol - x;
        const eRelY = this._endRow - y;
        let reversed;
        if (!flipped) {
            reversed = (eRelX === 0 && eRelY === 0);
        } else {
            reversed = (eRelX === w - 1 && eRelY === 0);
        }

        this._preview = { x, y, w, h, flipped, reversed };
    }

    getOverlays() {
        const overlays = {};
        if (this._preview) {
            overlays.linePreview = this._preview;
        }
        return overlays;
    }

    getCursor() { return 'crosshair'; }
}

// --- tools/pencil.js ---
// === Pencil Tool: freehand character drawing ===

class PencilTool extends BaseTool {
    constructor(app) {
        super('pencil', app);
        this._drawing = false;
        this._drawChar = '*';
        this._previewCells = [];
    }

    activate() {
        this._drawing = false;
        this._previewCells = [];
    }

    deactivate() {
        this._drawing = false;
        this._previewCells = [];
    }

    onMouseDown(col, row, e) {
        this._drawing = true;
        this._previewCells = [];
        this.app.pushUndo();
        this._drawAt(col, row);
    }

    onMouseMove(col, row, e) {
        if (this._drawing) {
            this._drawAt(col, row);
        } else {
            this._previewCells = [{ col, row }];
            this.app.render();
        }
    }

    onMouseUp(col, row, e) {
        this._drawing = false;
        this._previewCells = [];
        this.app.render();
    }

    _drawAt(col, row) {
        // Create or find the "freehand" textbox component that spans the grid
        let freehand = this.app.components.find(c => c.type === 'textbox' && c.name === '_freehand');
        if (!freehand) {
            freehand = ComponentRegistry.create('textbox', 0, 0, {
                text: '',
                name: '_freehand',
            });
            freehand.w = GRID_COLS;
            freehand.h = GRID_ROWS;
            freehand.name = '_freehand';
            freehand.zIndex = -1000; // Below everything
            // Initialize empty text grid
            const lines = [];
            for (let r = 0; r < GRID_ROWS; r++) {
                lines.push(' '.repeat(GRID_COLS));
            }
            freehand.props.text = lines.join('\n');
            this.app.components.push(freehand);
        }

        // Set the character at (col, row) in the freehand text
        const lines = freehand.props.text.split('\n');
        while (lines.length <= row) lines.push(' '.repeat(GRID_COLS));
        const line = lines[row].padEnd(GRID_COLS);
        lines[row] = line.substring(0, col) + this._drawChar + line.substring(col + 1);
        freehand.props.text = lines.join('\n');

        this.app.render();
    }

    getOverlays() {
        return { drawPreview: this._previewCells };
    }

    getCursor() { return 'crosshair'; }
}

// --- tools/eraser.js ---
// === Eraser Tool: click to delete a component, drag region to delete all within ===

class EraserTool extends BaseTool {
    constructor(app) {
        super('eraser', app);
        this._dragging = false;
        this._startCol = 0;
        this._startRow = 0;
        this._endCol = 0;
        this._endRow = 0;
        this._marquee = null;
    }

    activate() {
        this._dragging = false;
        this._marquee = null;
    }

    deactivate() {
        this._dragging = false;
        this._marquee = null;
    }

    onMouseDown(col, row, e) {
        this._dragging = true;
        this._startCol = col;
        this._startRow = row;
        this._endCol = col;
        this._endRow = row;
        this._marquee = null;
    }

    onMouseMove(col, row, e) {
        if (!this._dragging) return;
        this._endCol = col;
        this._endRow = row;

        // Build marquee rect
        const x = Math.min(this._startCol, this._endCol);
        const y = Math.min(this._startRow, this._endRow);
        const w = Math.abs(this._endCol - this._startCol) + 1;
        const h = Math.abs(this._endRow - this._startRow) + 1;
        this._marquee = { x, y, w, h };
        this.app.render();
    }

    onMouseUp(col, row, e) {
        if (!this._dragging) return;
        this._dragging = false;

        const x = Math.min(this._startCol, col);
        const y = Math.min(this._startRow, row);
        const w = Math.abs(col - this._startCol) + 1;
        const h = Math.abs(row - this._startRow) + 1;

        // Small region (≤ 2 cells) — treat as single click, use start position
        if (w <= 2 && h <= 2) {
            const hit = this.app.hitTest(this._startCol, this._startRow);
            if (hit && !hit.locked) {
                this.app.deleteComponent(hit);
            } else {
                this.app._toast('Nothing to erase here');
            }
        } else {
            // Region drag: delete all components that overlap the marquee
            const toDelete = this.app.components.filter(c =>
                c.visible && !c.locked && c.name !== '_freehand' &&
                c.x < x + w && c.x + c.w > x &&
                c.y < y + h && c.y + c.h > y
            );
            if (toDelete.length > 0) {
                this.app.pushUndo();
                for (const comp of toDelete) {
                    const idx = this.app.components.indexOf(comp);
                    if (idx >= 0) this.app.components.splice(idx, 1);
                }
                for (const comp of toDelete) {
                    this.app.selectedComponents.delete(comp.id);
                }
                this.app._updateSelectionUI();
                this.app.layersUI.update();
                this.app.statusBarUI.updateCount(
                    this.app.components.filter(c => c.name !== '_freehand').length
                );
                this.app._toast(`Deleted ${toDelete.length} component${toDelete.length > 1 ? 's' : ''}`);
            } else {
                this.app._toast('No components in region');
            }
        }

        this._marquee = null;
        this.app.render();
    }

    getOverlays() {
        const overlays = {};
        if (this._marquee) {
            overlays.selectionRect = this._marquee;
        }
        return overlays;
    }

    getCursor() { return 'crosshair'; }
}

// --- tools/brush.js ---
// === Brush Tool: draw with box-drawing characters ===

class BrushTool extends BaseTool {
    constructor(app) {
        super('brush', app);
        this._drawing = false;
        this._lastCol = -1;
        this._lastRow = -1;
        this._previewCells = [];
    }

    activate() {
        this._drawing = false;
        this._previewCells = [];
    }

    deactivate() {
        this._drawing = false;
        this._previewCells = [];
    }

    onMouseDown(col, row, e) {
        this._drawing = true;
        this._lastCol = col;
        this._lastRow = row;
        this.app.pushUndo();
        this._brushAt(col, row, col, row);
    }

    onMouseMove(col, row, e) {
        if (this._drawing) {
            this._brushAt(this._lastCol, this._lastRow, col, row);
            this._lastCol = col;
            this._lastRow = row;
        } else {
            this._previewCells = [{ col, row }];
            this.app.render();
        }
    }

    onMouseUp(col, row, e) {
        this._drawing = false;
        this._lastCol = -1;
        this._lastRow = -1;
        this._previewCells = [];
        this.app.render();
    }

    _brushAt(fromCol, fromRow, toCol, toRow) {
        // Get or create freehand layer
        let freehand = this.app.components.find(c => c.type === 'textbox' && c.name === '_freehand');
        if (!freehand) {
            freehand = ComponentRegistry.create('textbox', 0, 0, {
                text: '',
                name: '_freehand',
            });
            freehand.w = GRID_COLS;
            freehand.h = GRID_ROWS;
            freehand.name = '_freehand';
            freehand.zIndex = -1000;
            const lines = [];
            for (let r = 0; r < GRID_ROWS; r++) {
                lines.push(' '.repeat(GRID_COLS));
            }
            freehand.props.text = lines.join('\n');
            this.app.components.push(freehand);
        }

        const bc = BORDER_CHARS.single;
        const lines = freehand.props.text.split('\n');
        while (lines.length < GRID_ROWS) lines.push(' '.repeat(GRID_COLS));

        // Draw line from (fromCol,fromRow) to (toCol,toRow) using box chars
        const dx = toCol - fromCol;
        const dy = toRow - fromRow;

        if (Math.abs(dx) >= Math.abs(dy)) {
            // Mostly horizontal
            const steps = Math.max(1, Math.abs(dx));
            for (let i = 0; i <= steps; i++) {
                const c = fromCol + Math.round(dx * i / steps);
                const r = fromRow + Math.round(dy * i / steps);
                this._setChar(lines, c, r, bc.h);
            }
        } else {
            // Mostly vertical
            const steps = Math.max(1, Math.abs(dy));
            for (let i = 0; i <= steps; i++) {
                const c = fromCol + Math.round(dx * i / steps);
                const r = fromRow + Math.round(dy * i / steps);
                this._setChar(lines, c, r, bc.v);
            }
        }

        freehand.props.text = lines.join('\n');
        this.app.render();
    }

    _setChar(lines, col, row, ch) {
        if (row < 0 || row >= lines.length || col < 0 || col >= GRID_COLS) return;
        const line = lines[row].padEnd(GRID_COLS);
        lines[row] = line.substring(0, col) + ch + line.substring(col + 1);
    }

    getOverlays() {
        return { drawPreview: this._previewCells };
    }

    getCursor() { return 'crosshair'; }
}

// --- ui/eventbus.js ---
// === EventBus: simple pub/sub system ===

class EventBus {
    constructor() {
        this._listeners = {};
    }

    on(event, fn) {
        if (!this._listeners[event]) this._listeners[event] = [];
        this._listeners[event].push(fn);
    }

    off(event, fn) {
        const list = this._listeners[event];
        if (!list) return;
        this._listeners[event] = list.filter(f => f !== fn);
    }

    emit(event, ...args) {
        const list = this._listeners[event];
        if (!list) return;
        for (const fn of list) {
            fn(...args);
        }
    }
}

// --- ui/inspector.js ---
// === Inspector: right panel property editor ===

class InspectorUI {
    constructor(app) {
        this.app = app;
        this._container = document.getElementById('inspector-content');
    }

    update(component) {
        this._container.innerHTML = '';
        if (!component) {
            const count = this.app.selectedComponents.size;
            if (count > 1) {
                this._container.innerHTML = '<div style="padding: 10px; color: #6c7086; font-size: 11px;">' + count + ' items selected</div>';
            } else {
                this._container.innerHTML = '<div style="padding: 10px; color: #6c7086; font-size: 11px;">No selection</div>';
            }
            return;
        }

        // Type label
        const typeDiv = document.createElement('div');
        typeDiv.style.cssText = 'padding: 6px 10px; font-size: 12px; color: #89b4fa; font-weight: 600;';
        typeDiv.textContent = component.type.charAt(0).toUpperCase() + component.type.slice(1);
        this._container.appendChild(typeDiv);

        // Name
        this._addPropRow('Name', 'name', component.name, 'text', (val) => {
            component.name = val;
            this.app.bus.emit('componentChanged', component);
        });

        // Editable props
        const props = component.getEditableProps();
        for (const prop of props) {
            const currentVal = prop.propsBased ? component.props[prop.key] : component.getProp(prop.key);
            if (prop.type === 'select') {
                this._addSelectRow(prop.label, prop.key, currentVal, prop.options, (val) => {
                    if (prop.propsBased) {
                        // Handle boolean-ish strings
                        if (val === 'true') val = true;
                        else if (val === 'false') val = false;
                        component.props[prop.key] = val;
                    } else {
                        component.setProp(prop.key, val);
                    }
                    this.app.bus.emit('componentChanged', component);
                    this.app.render();
                });
            } else {
                const displayVal = Array.isArray(currentVal) ? currentVal.join(', ') : currentVal;
                this._addPropRow(prop.label, prop.key, displayVal, prop.type, (val) => {
                    if (prop.propsBased) {
                        if (prop.type === 'number') val = parseInt(val, 10) || 0;
                        else if (Array.isArray(component.props[prop.key])) val = val.split(',').map(s => s.trim());
                        component.props[prop.key] = val;
                    } else {
                        component.setProp(prop.key, val);
                    }
                    this.app.bus.emit('componentChanged', component);
                    this.app.render();
                });
            }
        }

        // Z-index
        this._addPropRow('Z-Index', 'zIndex', component.zIndex, 'number', (val) => {
            component.zIndex = parseInt(val, 10) || 0;
            this.app.bus.emit('componentChanged', component);
            this.app.render();
        });
    }

    _addPropRow(label, key, value, type, onChange) {
        const row = document.createElement('div');
        row.className = 'prop-row';

        const lbl = document.createElement('span');
        lbl.className = 'prop-label';
        lbl.textContent = label;

        const input = document.createElement('input');
        input.className = 'prop-input';
        input.type = type === 'number' ? 'number' : 'text';
        input.value = value !== undefined ? value : '';
        input.addEventListener('change', () => onChange(input.value));
        input.addEventListener('keydown', (e) => e.stopPropagation()); // prevent tool shortcuts

        row.appendChild(lbl);
        row.appendChild(input);
        this._container.appendChild(row);
    }

    _addSelectRow(label, key, value, options, onChange) {
        const row = document.createElement('div');
        row.className = 'prop-row';

        const lbl = document.createElement('span');
        lbl.className = 'prop-label';
        lbl.textContent = label;

        const select = document.createElement('select');
        select.className = 'prop-select';
        for (const opt of options) {
            const o = document.createElement('option');
            o.value = opt;
            o.textContent = opt;
            if (String(value) === String(opt)) o.selected = true;
            select.appendChild(o);
        }
        select.addEventListener('change', () => onChange(select.value));

        row.appendChild(lbl);
        row.appendChild(select);
        this._container.appendChild(row);
    }
}

// --- ui/layers.js ---
// === Layers Panel: component list with visibility/reorder + group/ungroup ===

class LayersUI {
    constructor(app) {
        this.app = app;
        this._container = document.getElementById('layers-content');
        this._buildHeader();
    }

    _buildHeader() {
        const section = document.getElementById('layers-section');
        const header = section.querySelector('.panel-header');

        const btnRow = document.createElement('div');
        btnRow.style.cssText = 'display:flex; gap:4px; padding:2px 10px 4px;';

        const mkBtn = document.createElement('button');
        mkBtn.className = 'layer-btn';
        mkBtn.textContent = 'MkGroup';
        mkBtn.title = 'Group selected layers';
        mkBtn.style.cssText = 'font-size:10px; padding:2px 6px; border:1px solid #45475a; border-radius:3px;';
        mkBtn.addEventListener('click', () => {
            this.app.mkGroup(); // uses selectedComponents by default
        });

        const deBtn = document.createElement('button');
        deBtn.className = 'layer-btn';
        deBtn.textContent = 'DeGroup';
        deBtn.title = 'Ungroup selected group';
        deBtn.style.cssText = 'font-size:10px; padding:2px 6px; border:1px solid #45475a; border-radius:3px;';
        deBtn.addEventListener('click', () => {
            this.app.deGroup();
        });

        btnRow.appendChild(mkBtn);
        btnRow.appendChild(deBtn);
        header.after(btnRow);
    }

    update() {
        this._container.innerHTML = '';
        // Show components in reverse z-order (top first)
        const sorted = [...this.app.components]
            .filter(c => c.name !== '_freehand')
            .sort((a, b) => b.zIndex - a.zIndex);

        for (const comp of sorted) {
            this._buildLayerItem(comp, false);

            // If group, show children indented
            if (comp.type === 'group' && comp.children) {
                for (const child of comp.children) {
                    this._buildLayerItem(child, true);
                }
            }
        }

        if (sorted.length === 0) {
            const empty = document.createElement('div');
            empty.style.cssText = 'padding: 10px; color: #6c7086; font-size: 11px;';
            empty.textContent = 'No components';
            this._container.appendChild(empty);
        }
    }

    _buildLayerItem(comp, isChild) {
        const isSelected = this.app.isSelected(comp);
        const item = document.createElement('div');
        item.className = 'layer-item' + (isSelected ? ' selected' : '');

        if (isChild) {
            // Indented child row — read-only
            const indent = document.createElement('span');
            indent.style.cssText = 'color:#6c7086; font-size:10px; width:28px; text-align:right; flex-shrink:0;';
            indent.textContent = '└';
            item.appendChild(indent);
        }

        const vis = document.createElement('span');
        vis.className = 'vis-toggle';
        vis.textContent = comp.visible ? '■' : '□';
        if (!isChild) {
            vis.addEventListener('click', (e) => {
                e.stopPropagation();
                comp.visible = !comp.visible;
                this.app.render();
                this.update();
            });
        }

        const name = document.createElement('span');
        name.className = 'layer-name';
        name.textContent = comp.name;
        if (isChild) {
            name.style.color = '#6c7086';
            name.style.fontSize = '11px';
        }

        item.appendChild(vis);
        item.appendChild(name);

        if (!isChild) {
            const actions = document.createElement('span');
            actions.className = 'layer-actions';

            const upBtn = document.createElement('button');
            upBtn.className = 'layer-btn';
            upBtn.textContent = '▲';
            upBtn.title = 'Move up';
            upBtn.addEventListener('click', (e) => {
                e.stopPropagation();
                comp.zIndex++;
                this.app.render();
                this.update();
            });

            const downBtn = document.createElement('button');
            downBtn.className = 'layer-btn';
            downBtn.textContent = '▼';
            downBtn.title = 'Move down';
            downBtn.addEventListener('click', (e) => {
                e.stopPropagation();
                comp.zIndex--;
                this.app.render();
                this.update();
            });

            const delBtn = document.createElement('button');
            delBtn.className = 'layer-btn';
            delBtn.textContent = '×';
            delBtn.title = 'Delete';
            delBtn.addEventListener('click', (e) => {
                e.stopPropagation();
                this.app.deleteComponent(comp);
            });

            actions.appendChild(upBtn);
            actions.appendChild(downBtn);
            actions.appendChild(delBtn);
            item.appendChild(actions);

            item.addEventListener('click', (e) => {
                if (e.shiftKey) {
                    this.app.toggleSelect(comp);
                } else {
                    this.app.selectComponent(comp);
                }
            });
        }

        this._container.appendChild(item);
    }
}

// --- ui/splitter.js ---
// === Splitter: resizable panel borders ===

class PanelSplitter {
    constructor(splitterEl, panelEl, side, options = {}) {
        this._splitter = splitterEl;
        this._panel = panelEl;
        this._side = side; // 'left' or 'right'
        this._minWidth = options.minWidth || 100;
        this._maxWidth = options.maxWidth || 400;
        this._dragging = false;
        this._startX = 0;
        this._startWidth = 0;
        this._onResize = options.onResize || null;
        this._bind();
    }

    _bind() {
        this._splitter.addEventListener('mousedown', (e) => {
            e.preventDefault();
            this._dragging = true;
            this._startX = e.clientX;
            this._startWidth = this._panel.offsetWidth;
            this._splitter.classList.add('active');
            document.body.style.cursor = 'col-resize';
            document.body.style.userSelect = 'none';
        });

        document.addEventListener('mousemove', (e) => {
            if (!this._dragging) return;
            let delta;
            if (this._side === 'left') {
                delta = e.clientX - this._startX;
            } else {
                delta = this._startX - e.clientX;
            }
            const newWidth = Math.min(this._maxWidth, Math.max(this._minWidth, this._startWidth + delta));
            this._panel.style.width = newWidth + 'px';
            if (this._onResize) this._onResize();
        });

        document.addEventListener('mouseup', () => {
            if (!this._dragging) return;
            this._dragging = false;
            this._splitter.classList.remove('active');
            document.body.style.cursor = '';
            document.body.style.userSelect = '';
            if (this._onResize) this._onResize();
        });
    }
}

// --- ui/statusbar.js ---
// === StatusBar: bottom info bar ===

class StatusBarUI {
    constructor(app) {
        this.app = app;

        this._grid = document.getElementById('status-grid');
        this._count = document.getElementById('status-count');
        this._tool = document.getElementById('status-tool');

    updateGrid(cols, rows) {

    }

    updateCount(n) {

    updateTool(name) {
        this._tool.textContent = name.charAt(0).toUpperCase() + name.slice(1);
    }
}

// --- ui/app.js ---
// === App: main orchestrator ===

class App {
    constructor() {
        this.bus = new EventBus();
        this.grid = new CharGrid();
        this.canvas = document.getElementById('grid-canvas');
        this.renderer = new CanvasRenderer(this.canvas);
        this.history = new UndoManager();
        this.components = [];
        this.selectedComponents = new Set(); // stores component IDs
        this.currentToolId = 'select';
        this._cursorCol = 0;
        this._cursorRow = 0;
        this._clipboard = null;

        // Tools
        this._tools = {
            select: new SelectTool(this),
            text: new TextTool(this),
            line: new LineTool(this, false),
            arrow: new LineTool(this, true),
            eraser: new EraserTool(this),
        };
        this._activeTool = this._tools.select;

        // UI
        this.toolbarUI = new ToolbarUI(this);
        this.paletteUI = new PaletteUI(this);
        this.inspectorUI = new InspectorUI(this);
        this.layersUI = new LayersUI(this);
        this.statusBarUI = new StatusBarUI(this);

        // Splitters
        this._leftSplitter = new PanelSplitter(
            document.getElementById('left-splitter'),
            document.getElementById('left-panel'),
            'left',
            { minWidth: 100, maxWidth: 300, onResize: () => this.render() }
        );
        this._rightSplitter = new PanelSplitter(
            document.getElementById('right-splitter'),
            document.getElementById('right-panel'),
            'right',
            { minWidth: 140, maxWidth: 400, onResize: () => this.render() }
        );

        // Init
        this.renderer.resizeToGrid(this.grid.cols, this.grid.rows);
        this.statusBarUI.updateGrid(this.grid.cols, this.grid.rows);
        this.statusBarUI.updateCount(0);

        this._bindEvents();
        this._loadAutoSave();
        this.render();
    }

    _bindEvents() {
        // Canvas mouse events
        const canvasArea = document.getElementById('canvas-area');

        this.canvas.addEventListener('mousedown', (e) => {
            const rect = this.canvas.getBoundingClientRect();
            const px = e.clientX - rect.left;
            const py = e.clientY - rect.top;
            const { col, row } = this.renderer.pixelToGrid(px, py);
            this._activeTool.onMouseDown(col, row, e);
        });

        this.canvas.addEventListener('mousemove', (e) => {
            const rect = this.canvas.getBoundingClientRect();
            const px = e.clientX - rect.left;
            const py = e.clientY - rect.top;
            const { col, row } = this.renderer.pixelToGrid(px, py);
            this._cursorCol = col;
            this._cursorRow = row;
            this.statusBarUI.updatePos(col, row);
            this._activeTool.onMouseMove(col, row, e);
        });

        // mouseup on document so it fires even if mouse leaves canvas
        document.addEventListener('mouseup', (e) => {
            const rect = this.canvas.getBoundingClientRect();
            const px = e.clientX - rect.left;
            const py = e.clientY - rect.top;
            const { col, row } = this.renderer.pixelToGrid(px, py);
            this._activeTool.onMouseUp(col, row, e);
        });

        this.canvas.addEventListener('mouseleave', () => {
            this._cursorCol = -1;
            this._cursorRow = -1;
            this.render();
        });

        // Double-click to edit text
        this.canvas.addEventListener('dblclick', (e) => {
            const rect = this.canvas.getBoundingClientRect();
            const px = e.clientX - rect.left;
            const py = e.clientY - rect.top;
            const { col, row } = this.renderer.pixelToGrid(px, py);
            let hit = this.hitTest(col, row);
            // Drill into group to find the actual child at (col, row)
            if (hit && hit.type === 'group' && hit.children) {
                const child = [...hit.children]
                    .filter(c => c && typeof c === 'object' && c.contains)
                    .sort((a, b) => b.zIndex - a.zIndex)
                    .find(c => c.contains(col, row));
                if (child) hit = child;
            }
            if (!hit) return;
            const info = this._getInlineEditInfo(hit, col, row);
            if (info) {
                this._startInlineEdit(hit, px, py, info.propKey, info.editBounds || null, info.onSave || null);
            }
        });

        // Drag-and-drop from palette
        this.canvas.addEventListener('dragover', (e) => {
            e.preventDefault();
            e.dataTransfer.dropEffect = 'copy';
        });

        this.canvas.addEventListener('drop', (e) => {
            e.preventDefault();
            const type = e.dataTransfer.getData('text/plain');
            if (!type) return;
            const rect = this.canvas.getBoundingClientRect();
            const px = e.clientX - rect.left;
            const py = e.clientY - rect.top;
            const { col, row } = this.renderer.pixelToGrid(px, py);
            this.addComponentAt(type, col, row);
        });

        // Keyboard shortcuts
        document.addEventListener('keydown', (e) => {
            // Don't intercept when editing inputs
            if (e.target.tagName === 'INPUT' || e.target.tagName === 'TEXTAREA' || e.target.tagName === 'SELECT') return;

            const key = this._getShortcutKey(e);
            const action = SHORTCUTS[key] || SHORTCUTS[e.key];
            if (action) {
                e.preventDefault();
                this._handleAction(action);
            }
        });

        // EventBus actions
        this.bus.on('action', (action) => this._handleAction(action));
        this.bus.on('componentChanged', () => {
            this.render();
            this.layersUI.update();
        });

        // Auto-save every 30 seconds
        setInterval(() => this._autoSave(), 30000);

        // Window resize
        window.addEventListener('resize', () => this.render());
    }

    _getShortcutKey(e) {
        const parts = [];
        if (e.ctrlKey) parts.push('ctrl');
        if (e.metaKey) parts.push('meta');
        if (e.shiftKey) parts.push('shift');
        if (e.altKey) parts.push('alt');
        parts.push(e.key);
        return parts.join('+');
    }

    _handleAction(action) {
        if (action.startsWith('tool:')) {
            this.setTool(action.substring(5));
            return;
        }

        switch (action) {
            case 'undo': this.undo(); break;
            case 'redo': this.redo(); break;
            case 'delete': this.deleteSelected(); break;
            case 'deselect': this.selectComponent(null); break;
            case 'selectAll': {
                const all = this.components.filter(c => c.name !== '_freehand' && c.visible);
                if (all.length > 0) this.selectMultiple(all);
                break;
            }
            case 'copy': this.copySelected(); break;
            case 'paste': this.pasteClipboard(); break;
            case 'cut': this.cutSelected(); break;
            case 'save': this.saveToFile(); break;
            case 'saveAs': this.saveToFile(); break;
            case 'load': this.loadFromFile(); break;
            case 'new': this.newCanvas(); break;
            case 'copyMarkdown': this.copyMarkdown(); break;
            case 'pasteMarkdown': this.pasteMarkdown(); break;
            case 'rotate': this.rotateSelected(); break;
        }
    }

    // === Tool Management ===

    setTool(toolId) {
        if (this._activeTool) this._activeTool.deactivate();
        this.currentToolId = toolId;
        this._activeTool = this._tools[toolId] || this._tools.select;
        this._activeTool.activate();
        this.canvas.style.cursor = this._activeTool.getCursor();
        this.paletteUI.updateActiveTool(toolId);
        this.statusBarUI.updateTool(toolId);
        this.render();
    }

    // === Component Management ===

    addComponentAt(type, col, row) {
        this.pushUndo();
        const comp = ComponentRegistry.create(type, col, row);
        comp.zIndex = this.components.length;
        this.components.push(comp);
        this.selectComponent(comp);
        this.render();
        this._toast(`Added ${type}`);
    }

    addComponentAtCenter(type) {
        const defaults = ComponentRegistry.getDefaults(type);
        const col = Math.floor((GRID_COLS - (defaults?.w || 10)) / 2);
        const row = Math.floor((GRID_ROWS - (defaults?.h || 4)) / 2);
        this.addComponentAt(type, col, row);
    }

    // === Selection Management ===

    get selectedComponent() {
        if (this.selectedComponents.size === 1) {
            const id = this.selectedComponents.values().next().value;
            return this.components.find(c => c.id === id) || null;
        }
        return null;
    }

    isSelected(comp) {
        return this.selectedComponents.has(comp.id);
    }

    getSelectedComponents() {
        return this.components.filter(c => this.selectedComponents.has(c.id));
    }

    selectComponent(comp) {
        this.selectedComponents.clear();
        if (comp) this.selectedComponents.add(comp.id);
        this.inspectorUI.update(comp);
        this.layersUI.update();
        this.render();
    }

    toggleSelect(comp) {
        if (this.selectedComponents.has(comp.id)) {
            this.selectedComponents.delete(comp.id);
        } else {
            this.selectedComponents.add(comp.id);
        }
        this._updateSelectionUI();
    }

    selectMultiple(comps) {
        this.selectedComponents.clear();
        for (const c of comps) this.selectedComponents.add(c.id);
        this._updateSelectionUI();
    }

    _updateSelectionUI() {
        const single = this.selectedComponent; // uses getter
        this.inspectorUI.update(single);
        this.layersUI.update();
        this.render();
    }

    deleteComponent(comp) {
        this.pushUndo();
        const idx = this.components.indexOf(comp);
        if (idx >= 0) {
            this.components.splice(idx, 1);
            this.selectedComponents.delete(comp.id);
            this._updateSelectionUI();
            this.statusBarUI.updateCount(this.components.filter(c => c.name !== '_freehand').length);
            this._toast('Deleted component');
        }
    }

    deleteSelected() {
        const toDelete = this.getSelectedComponents().filter(c => !c.locked);
        if (toDelete.length === 0) return;
        this.pushUndo();
        for (const comp of toDelete) {
            const idx = this.components.indexOf(comp);
            if (idx >= 0) this.components.splice(idx, 1);
            this.selectedComponents.delete(comp.id);
        }
        this._updateSelectionUI();
        this.statusBarUI.updateCount(this.components.filter(c => c.name !== '_freehand').length);
        this._toast(`Deleted ${toDelete.length} component${toDelete.length > 1 ? 's' : ''}`);
    }

    hitTest(col, row) {
        // Reverse z-order: topmost first
        const sorted = [...this.components]
            .filter(c => c.visible && c.name !== '_freehand')
            .sort((a, b) => b.zIndex - a.zIndex);
        for (const comp of sorted) {
            if (comp.contains(col, row)) return comp;
        }
        return null;
    }

    // === Undo / Redo ===

    pushUndo() {
        this.history.push(this.components);
    }

    undo() {
        const restored = this.history.undo(this.components);
        if (restored) {
            this.components = restored;
            this.selectedComponents.clear();
            this.inspectorUI.update(null);
            this.layersUI.update();
            this.statusBarUI.updateCount(this.components.filter(c => c.name !== '_freehand').length);
            this.render();
            this._toast('Undo');
        }
    }

    redo() {
        const restored = this.history.redo(this.components);
        if (restored) {
            this.components = restored;
            this.selectedComponents.clear();
            this.inspectorUI.update(null);
            this.layersUI.update();
            this.statusBarUI.updateCount(this.components.filter(c => c.name !== '_freehand').length);
            this.render();
            this._toast('Redo');
        }
    }

    // === Copy / Paste ===

    copySelected() {
        const selected = this.getSelectedComponents();
        if (selected.length > 0) {
            this._clipboard = selected.map(c => c.serialize());
            this._toast('Copied');
        }
    }

    pasteClipboard() {
        if (this._clipboard && this._clipboard.length > 0) {
            this.pushUndo();
            const pasted = [];
            for (const orig of this._clipboard) {
                const data = JSON.parse(JSON.stringify(orig));
                data.id = ++_componentIdCounter;
                data.name = `${data.type}_${data.id}`;
                data.x += 2;
                data.y += 1;
                // Offset group children positions and assign new IDs
                if (data.children && Array.isArray(data.children)) {
                    for (const child of data.children) {
                        child.id = ++_componentIdCounter;
                        child.name = `${child.type}_${child.id}`;
                        child.x += 2;
                        child.y += 1;
                    }
                }
                const comp = ComponentRegistry.deserialize(data);
                comp.zIndex = this.components.length;
                this.components.push(comp);
                pasted.push(comp);
            }
            this.selectMultiple(pasted);
            this._toast('Pasted');
        }
    }

    cutSelected() {
        const selected = this.getSelectedComponents();
        if (selected.length > 0) {
            this.copySelected();
            this.deleteSelected();
            this._toast('Cut');
        }
    }

    rotateSelected() {
        if (this.selectedComponents.size !== 1) return;
        const comp = this.selectedComponent;
        if (!comp || comp.locked) return;
        this.pushUndo();

        if (comp.type === 'line' || comp.type === 'arrow') {
            // Swap w and h + toggle flipped = 90° rotation
            const oldW = comp.w;
            comp.w = comp.h;
            comp.h = oldW;
            comp.props.flipped = !comp.props.flipped;
        } else {
            // General rotation: swap w and h
            const oldW = comp.w;
            comp.w = comp.h;
            comp.h = oldW;
        }

        // Keep within grid bounds
        if (comp.x + comp.w > GRID_COLS) comp.x = Math.max(0, GRID_COLS - comp.w);
        if (comp.y + comp.h > GRID_ROWS) comp.y = Math.max(0, GRID_ROWS - comp.h);

        this.inspectorUI.update(comp);
        this.render();
        this._toast('Rotated');
    }

    // === Group / Ungroup ===

    mkGroup(checkedIds = null) {
        const ids = checkedIds || this.selectedComponents;
        const targets = this.components.filter(c => ids.has(c.id) && c.name !== '_freehand');
        if (targets.length < 2) {
            this._toast('Select at least 2 components to group');
            return;
        }
        this.pushUndo();

        // Compute bounding box
        let minX = Infinity, minY = Infinity, maxX = -Infinity, maxY = -Infinity;
        for (const c of targets) {
            minX = Math.min(minX, c.x);
            minY = Math.min(minY, c.y);
            maxX = Math.max(maxX, c.x + c.w);
            maxY = Math.max(maxY, c.y + c.h);
        }

        const group = ComponentRegistry.create('group', minX, minY);
        group.w = maxX - minX;
        group.h = maxY - minY;
        group.children = targets;

        // Remove children from top-level components
        this.components = this.components.filter(c => !ids.has(c.id));
        group.zIndex = this.components.length;
        this.components.push(group);
        this.selectComponent(group);
        this.render();
        this._toast('Grouped ' + targets.length + ' components');
    }

    deGroup() {
        const sel = this.selectedComponent;
        if (!sel || sel.type !== 'group') {
            this._toast('Select a group to ungroup');
            return;
        }
        this.pushUndo();

        const children = sel.children;
        const idx = this.components.indexOf(sel);
        if (idx >= 0) this.components.splice(idx, 1);

        for (const child of children) {
            child.zIndex = this.components.length;
            this.components.push(child);
        }

        this.selectedComponents.clear();
        this.inspectorUI.update(null);
        this.layersUI.update();
        this.statusBarUI.updateCount(this.components.filter(c => c.name !== '_freehand').length);
        this.render();
        this._toast('Ungrouped ' + children.length + ' components');
    }

    // === File Operations ===

    saveToFile() {
        ExportUtils.saveToFile(this.components);
        this._toast('Saved to file');
    }

    async loadFromFile() {
        try {
            const components = await ExportUtils.loadFromFile();
            this.pushUndo();
            this.components = components;
            this.selectedComponents.clear();
            this.inspectorUI.update(null);
            this.layersUI.update();
            this.statusBarUI.updateCount(this.components.filter(c => c.name !== '_freehand').length);
            this.render();
            this._toast('Loaded from file');
        } catch (err) {
            this._toast('Load failed: ' + err.message);
        }
    }

    newCanvas() {
        if (this.components.length > 0 && !confirm('Clear canvas? Unsaved changes will be lost.')) return;
        this.pushUndo();
        this.components = [];
        this.selectedComponents.clear();
        this.inspectorUI.update(null);
        this.layersUI.update();
        this.statusBarUI.updateCount(0);
        this.history.clear();
        localStorage.removeItem('kaomoji_project');
        this.render();
        this._toast('New canvas');
    }

    async copyMarkdown() {
        this.grid.composite(this.components.filter(c => c.visible));
        const md = ExportUtils.exportAsMarkdown(this.grid);
        const ok = await ExportUtils.copyToClipboard(md);
        this._toast(ok ? 'Markdown copied!' : 'Copy failed');
    }

    async pasteMarkdown() {
        try {
            let text = await navigator.clipboard.readText();
            if (!text) { this._toast('Clipboard is empty'); return; }
            // Strip markdown code fence if present
            text = text.replace(/^```[^\n]*\n/, '').replace(/\n```\s*$/, '');
            const lines = text.split('\n');
            const h = lines.length;
            const w = Math.max(...lines.map(l => l.length));
            if (w === 0 || h === 0) { this._toast('Nothing to paste'); return; }
            // Pad lines to equal width
            const padded = lines.map(l => l.padEnd(w));
            this.pushUndo();
            const comp = new TextBoxComponent(0, 0, w, h, { text: padded.join('\n') });
            comp.id = ++_componentIdCounter;
            comp.name = `textbox_${comp.id}`;
            comp.zIndex = this.components.length;
            this.components.push(comp);
            this.selectComponent(comp);
            this.render();
            this._toast('Pasted markdown');
        } catch (err) {
            this._toast('Paste failed: ' + err.message);
        }
    }

    // === Inline Text Editing ===

    _getInlineEditInfo(comp, col, row) {
        switch (comp.type) {
            case 'textbox':
                return { propKey: 'text' };

            case 'button':
                return {
                    propKey: 'label',
                    editBounds: { x: comp.x + 2, y: comp.y, w: Math.max(1, comp.w - 4), h: 1 },
                };

            case 'input':
                return {
                    propKey: 'placeholder',
                    editBounds: { x: comp.x + 1, y: comp.y, w: Math.max(1, comp.w - 2), h: 1 },
                };

            case 'card':
                return {
                    propKey: 'title',
                    editBounds: { x: comp.x + 2, y: comp.y + 1, w: Math.max(1, comp.w - 4), h: 1 },
                };

            case 'modal':
                return {
                    propKey: 'title',
                    editBounds: { x: comp.x + 2, y: comp.y + 1, w: Math.max(1, comp.w - 6), h: 1 },
                };

            case 'table': {
                const numCols = Math.min(comp.props.cols, Math.max(1, Math.floor((comp.w - 1) / 3)));
                const colWidth = Math.floor((comp.w - 1) / numCols);
                const localCol = col - comp.x;
                const colIdx = Math.min(numCols - 1, Math.max(0, Math.floor(localCol / colWidth)));
                const headers = comp.props.headers || [];
                return {
                    propKey: 'headers',
                    editBounds: {
                        x: comp.x + colIdx * colWidth + 1,
                        y: comp.y + 1,
                        w: Math.max(1, colWidth - 1),
                        h: 1,
                    },
                    onSave: {
                        initValue: headers[colIdx] || '',
                        save: (val) => { headers[colIdx] = val; comp.props.headers = [...headers]; },
                    },
                };
            }

            case 'tabs': {
                const tabs = comp.props.tabs || [];
                const activeIdx = comp.props.activeIndex || 0;
                let cx = 0;
                const localCol = col - comp.x;
                for (let i = 0; i < tabs.length; i++) {
                    const label = tabs[i];
                    const isActive = (i === activeIdx);
                    const tabWidth = isActive ? label.length + 2 : label.length;
                    if (localCol >= cx && localCol < cx + tabWidth + 1) {
                        const textStart = isActive ? cx + 1 : cx;
                        return {
                            propKey: 'tabs',
                            editBounds: {
                                x: comp.x + textStart,
                                y: comp.y,
                                w: Math.max(1, label.length),
                                h: 1,
                            },
                            onSave: {
                                initValue: label,
                                save: (val) => { tabs[i] = val; comp.props.tabs = [...tabs]; },
                            },
                        };
                    }
                    cx += tabWidth + 1;
                }
                return null;
            }

            case 'navbar': {
                const localCol = col - comp.x;
                const logo = comp.props.logo || '';
                const links = comp.props.links || [];
                const action = comp.props.action || '';

                // Logo region
                if (localCol < logo.length + 2) {
                    return {
                        propKey: 'logo',
                        editBounds: { x: comp.x, y: comp.y, w: Math.max(1, logo.length), h: 1 },
                        onSave: {
                            initValue: logo,
                            save: (val) => { comp.props.logo = val; },
                        },
                    };
                }

                // Action region (right-aligned)
                const actionText = action ? `[${action}]` : '';
                const actionStart = comp.w - actionText.length;
                if (actionText && localCol >= actionStart) {
                    return {
                        propKey: 'action',
                        editBounds: { x: comp.x + actionStart + 1, y: comp.y, w: Math.max(1, action.length), h: 1 },
                        onSave: {
                            initValue: action,
                            save: (val) => { comp.props.action = val; },
                        },
                    };
                }

                // Links region
                let linkCol = logo.length + 2;
                for (let i = 0; i < links.length; i++) {
                    const link = links[i];
                    if (localCol >= linkCol && localCol < linkCol + link.length + 2) {
                        return {
                            propKey: 'links',
                            editBounds: { x: comp.x + linkCol, y: comp.y, w: Math.max(1, link.length), h: 1 },
                            onSave: {
                                initValue: link,
                                save: (val) => { links[i] = val; comp.props.links = [...links]; },
                            },
                        };
                    }
                    linkCol += link.length + 2;
                }
                return null;
            }

            case 'dropdown':
                return {
                    propKey: 'value',
                    editBounds: { x: comp.x + 1, y: comp.y, w: Math.max(1, comp.w - 4), h: 1 },
                };

            case 'search':
                return {
                    propKey: 'placeholder',
                    editBounds: { x: comp.x + 3, y: comp.y, w: Math.max(1, comp.w - 4), h: 1 },
                };

            case 'checkbox':
                return {
                    propKey: 'label',
                    editBounds: { x: comp.x + 4, y: comp.y, w: Math.max(1, comp.w - 4), h: 1 },
                };

            case 'radio':
                return {
                    propKey: 'label',
                    editBounds: { x: comp.x + 4, y: comp.y, w: Math.max(1, comp.w - 4), h: 1 },
                };

            case 'toggle': {
                const prefixLen = comp.props.on ? 8 : 9; // '[━●] On ' or '[●━] Off '
                return {
                    propKey: 'label',
                    editBounds: { x: comp.x + prefixLen, y: comp.y, w: Math.max(1, comp.w - prefixLen), h: 1 },
                };
            }

            case 'breadcrumb':
                return {
                    propKey: 'items',
                    onSave: {
                        initValue: (comp.props.items || []).join(', '),
                        save: (val) => { comp.props.items = val.split(',').map(s => s.trim()).filter(s => s); },
                    },
                };

            default:
                return null;
        }
    }

    _startInlineEdit(comp, px, py, propKey = 'text', editBounds = null, onSave = null) {
        const editor = document.getElementById('inline-editor');
        const canvasArea = document.getElementById('canvas-area');
        const canvasRect = this.canvas.getBoundingClientRect();
        const areaRect = canvasArea.getBoundingClientRect();

        const bx = editBounds ? editBounds.x : comp.x;
        const by = editBounds ? editBounds.y : comp.y;
        const bw = editBounds ? editBounds.w : comp.w;
        const bh = editBounds ? editBounds.h : comp.h;

        const x = bx * this.renderer.charWidth + (canvasRect.left - areaRect.left) + canvasArea.scrollLeft;
        const y = by * this.renderer.charHeight + (canvasRect.top - areaRect.top) + canvasArea.scrollTop;

        editor.style.display = 'block';
        editor.style.left = x + 'px';
        editor.style.top = y + 'px';
        editor.style.width = (bw * this.renderer.charWidth) + 'px';
        editor.style.height = (bh * this.renderer.charHeight) + 'px';
        editor.style.fontSize = this.renderer.fontSize + 'px';
        editor.style.fontFamily = this.renderer.fontFamily;
        editor.style.lineHeight = this.renderer.charHeight + 'px';
        // Match canvas per-cell character spacing
        const extraSpace = this.renderer.charWidth - this.renderer._fontCharWidth;
        editor.style.letterSpacing = extraSpace + 'px';
        editor.style.paddingLeft = Math.floor(extraSpace / 2) + 'px';
        editor.style.paddingTop = Math.floor((this.renderer.charHeight - this.renderer.fontSize) / 2) + 'px';
        if (onSave) {
            editor.value = onSave.initValue;
        } else {
            const rawVal = comp.props[propKey];
            const isArray = Array.isArray(rawVal);
            editor.value = isArray ? rawVal.join(', ') : (rawVal || '');
        }
        editor.focus();
        editor.select();

        let finished = false;
        const finish = () => {
            if (finished) return;
            finished = true;
            this.pushUndo();
            if (onSave) {
                onSave.save(editor.value);
            } else {
                const rawVal = comp.props[propKey];
                const isArray = Array.isArray(rawVal);
                comp.props[propKey] = isArray ? editor.value.split(',').map(s => s.trim()) : editor.value;
            }
            editor.style.display = 'none';
            editor.removeEventListener('blur', finish);
            editor.removeEventListener('keydown', onKey);
            this.render();
            this.inspectorUI.update(comp);
        };

        const onKey = (e) => {
            e.stopPropagation();
            if (e.key === 'Escape') {
                editor.style.display = 'none';
                editor.removeEventListener('blur', finish);
                editor.removeEventListener('keydown', onKey);
            } else if (e.key === 'Enter' && !e.shiftKey) {
                e.preventDefault();
                finish();
            }
        };

        editor.addEventListener('blur', finish);
        editor.addEventListener('keydown', onKey);
    }

    // === Rendering ===

    render() {
        // Composite all visible components onto grid
        this.grid.composite(this.components.filter(c => c.visible));

        // Build overlays
        const overlays = this._activeTool.getOverlays();
        if (this._cursorCol >= 0 && this._cursorRow >= 0) {
            overlays.cursor = { col: this._cursorCol, row: this._cursorRow };
        }

        // Render
        this.renderer.render(this.grid, overlays);

        // Update component count
        this.statusBarUI.updateCount(this.components.filter(c => c.name !== '_freehand').length);
    }

    // === Auto-save ===

    _autoSave() {
        if (this.components.length > 0) {
            ExportUtils.saveToLocalStorage(this.components);
        } else {
            localStorage.removeItem('kaomoji_project');
        }
    }

    _loadAutoSave() {
        const components = ExportUtils.loadFromLocalStorage();
        if (components && components.length > 0) {
            this.components = components;
            this.layersUI.update();
            this.statusBarUI.updateCount(this.components.filter(c => c.name !== '_freehand').length);
        }
    }

    // === Toast ===

    _toast(msg, duration = 2000) {
        const el = document.getElementById('toast');
        el.textContent = msg;
        el.classList.add('show');
        clearTimeout(this._toastTimer);
        this._toastTimer = setTimeout(() => el.classList.remove('show'), duration);
    }
}

// === Bootstrap ===
document.addEventListener('DOMContentLoaded', () => {
    window.app = new App();
});
