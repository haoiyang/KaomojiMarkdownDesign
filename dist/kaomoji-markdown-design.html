<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>KaomojiMarkdownDesign — ASCII Wireframe Editor</title>
<style>
/* === Reset & Base === */
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
html, body { height: 100%; overflow: hidden; }
body {
    font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
    font-size: 13px;
    background: #1e1e2e;
    color: #cdd6f4;
    display: flex;
    flex-direction: column;
}

/* === Toolbar === */
#toolbar {
    display: flex;
    align-items: center;
    height: 40px;
    background: #11111b;
    border-bottom: 1px solid #313244;
    padding: 0 12px;
    gap: 8px;
    flex-shrink: 0;
    user-select: none;
}
#toolbar .logo {
    font-weight: 700;
    font-size: 14px;
    color: #cba6f7;
    margin-right: 16px;
    white-space: nowrap;
}
#toolbar .spacer { flex: 1; }
.toolbar-btn {
    background: #313244;
    border: 1px solid #45475a;
    color: #cdd6f4;
    padding: 4px 12px;
    border-radius: 4px;
    font-size: 12px;
    cursor: pointer;
    white-space: nowrap;
}
.toolbar-btn:hover { background: #45475a; }
.toolbar-btn.primary { background: #89b4fa; color: #1e1e2e; border-color: #89b4fa; }
.toolbar-btn.primary:hover { background: #b4befe; }

/* === Main Layout === */
#main {
    display: flex;
    flex: 1;
    overflow: hidden;
}

/* === Left Panel === */
#left-panel {
    width: 160px;
    background: #1e1e2e;
    border-right: none;
    display: flex;
    flex-direction: column;
    overflow-y: auto;
    flex-shrink: 0;
    user-select: none;
}

/* === Resizable Splitters === */
.panel-splitter {
    width: 4px;
    background: #313244;
    cursor: col-resize;
    flex-shrink: 0;
    transition: background 0.15s;
}
.panel-splitter:hover, .panel-splitter.active {
    background: #89b4fa;
}
.panel-section {
    border-bottom: 1px solid #313244;
}
.panel-header {
    font-size: 10px;
    font-weight: 600;
    text-transform: uppercase;
    letter-spacing: 0.08em;
    color: #6c7086;
    padding: 8px 10px 4px;
}
.panel-item {
    display: flex;
    align-items: center;
    gap: 6px;
    padding: 5px 10px;
    cursor: pointer;
    font-size: 12px;
    color: #cdd6f4;
}
.panel-item:hover { background: #313244; }
.panel-item.active { background: #45475a; color: #89b4fa; }
.panel-item .icon {
    width: 18px;
    text-align: center;
    font-family: "Courier New", monospace;
    font-size: 13px;
}
.panel-item .shortcut {
    margin-left: auto;
    font-size: 10px;
    color: #6c7086;
}
.elem-item {
    display: flex;
    align-items: center;
    gap: 6px;
    padding: 4px 10px;
    cursor: grab;
    font-size: 12px;
    color: #cdd6f4;
}
.elem-item:hover { background: #313244; }
.elem-item .preview {
    font-family: "Courier New", monospace;
    font-size: 11px;
    color: #a6adc8;
    white-space: nowrap;
}

/* === Canvas Area === */
#canvas-area {
    flex: 1;
    overflow: auto;
    background: #11111b;
    display: flex;
    align-items: flex-start;
    justify-content: flex-start;
    padding: 16px;
    position: relative;
}
#grid-canvas {
    cursor: crosshair;
    image-rendering: pixelated;
}

/* === Right Panel === */
#right-panel {
    width: 200px;
    background: #1e1e2e;
    border-left: none;
    display: flex;
    flex-direction: column;
    overflow-y: auto;
    flex-shrink: 0;
    user-select: none;
}
.prop-row {
    display: flex;
    align-items: center;
    padding: 4px 10px;
    gap: 6px;
}
.prop-label {
    font-size: 11px;
    color: #6c7086;
    width: 50px;
    flex-shrink: 0;
}
.prop-input {
    flex: 1;
    background: #313244;
    border: 1px solid #45475a;
    color: #cdd6f4;
    padding: 3px 6px;
    border-radius: 3px;
    font-size: 12px;
    font-family: "Courier New", monospace;
}
.prop-input:focus { outline: none; border-color: #89b4fa; }
.prop-select {
    flex: 1;
    background: #313244;
    border: 1px solid #45475a;
    color: #cdd6f4;
    padding: 3px 6px;
    border-radius: 3px;
    font-size: 12px;
}
.prop-select:focus { outline: none; border-color: #89b4fa; }

/* Layer items */
.layer-item {
    display: flex;
    align-items: center;
    gap: 6px;
    padding: 5px 10px;
    cursor: pointer;
    font-size: 12px;
}
.layer-item:hover { background: #313244; }
.layer-item.selected { background: #45475a; }
.layer-item .vis-toggle {
    cursor: pointer;
    font-size: 10px;
    width: 14px;
    text-align: center;
}
.layer-item .layer-name {
    flex: 1;
    white-space: nowrap;
    overflow: hidden;
    text-overflow: ellipsis;
}
.layer-item .layer-actions {
    display: flex;
    gap: 2px;
}
.layer-btn {
    background: none;
    border: none;
    color: #6c7086;
    cursor: pointer;
    font-size: 11px;
    padding: 1px 3px;
    border-radius: 2px;
}
.layer-btn:hover { color: #cdd6f4; background: #45475a; }

/* === Status Bar === */
#statusbar {
    display: flex;
    align-items: center;
    height: 24px;
    background: #11111b;
    border-top: 1px solid #313244;
    padding: 0 12px;
    font-size: 11px;
    color: #a6adc8;
    gap: 16px;
    flex-shrink: 0;
    user-select: none;
}
.status-item { white-space: nowrap; }

/* === Toast Notification === */
.toast {
    position: fixed;
    bottom: 40px;
    left: 50%;
    transform: translateX(-50%);
    background: #313244;
    color: #cdd6f4;
    padding: 8px 16px;
    border-radius: 6px;
    font-size: 12px;
    z-index: 9999;
    opacity: 0;
    transition: opacity 0.3s;
    pointer-events: none;
}
.toast.show { opacity: 1; }

/* === Inline Text Edit === */
#inline-editor {
    position: absolute;
    display: none;
    background: #181825;
    border: 1px solid #89b4fa;
    color: #cdd6f4;
    font-family: "Courier New", "Courier", monospace;
    padding: 0;
    outline: none;
    resize: none;
    overflow: hidden;
    z-index: 100;
    caret-color: #f5c2e7;
}

/* Scrollbar styling */
::-webkit-scrollbar { width: 8px; height: 8px; }
::-webkit-scrollbar-track { background: #1e1e2e; }
::-webkit-scrollbar-thumb { background: #45475a; border-radius: 4px; }
::-webkit-scrollbar-thumb:hover { background: #585b70; }
</style>
</head>

<!-- Toolbar -->
<div id="toolbar">

<!-- Scripts (in dependency order) -->
<!-- INJECT_JS_START -->
<script>
// --- utils/constants.js ---
// === Constants ===
const GRID_COLS = 80;
const GRID_ROWS = 40;
const DEFAULT_FONT_FAMILY = '"Courier New", "Courier", monospace';
const DEFAULT_FONT_SIZE = 14;
const MAX_UNDO_LEVELS = 50;

// Colors (dark theme)
const COLORS = {
    bg: '#1e1e2e',
    gridLine: '#313244',
    cellBg: '#181825',
    text: '#cdd6f4',
    textDim: '#6c7086',
    cursor: '#f5c2e7',
    selection: 'rgba(137, 180, 250, 0.25)',
    selectionBorder: '#89b4fa',
    handle: '#f38ba8',
    handleFill: '#1e1e2e',
    panelBg: '#1e1e2e',
    panelBorder: '#313244',
    panelText: '#cdd6f4',
    panelTextDim: '#6c7086',
    panelHover: '#313244',
    panelActive: '#45475a',
    accent: '#89b4fa',
    accentHover: '#b4befe',
    toolbarBg: '#11111b',
    statusBg: '#11111b',
    statusText: '#a6adc8',
    error: '#f38ba8',
    success: '#a6e3a1',
    warning: '#f9e2af',
};

// Keyboard shortcuts
const SHORTCUTS = {
    'ctrl+z': 'undo',
    'meta+z': 'undo',
    'ctrl+shift+z': 'redo',
    'meta+shift+z': 'redo',
    'ctrl+y': 'redo',
    'meta+y': 'redo',
    'ctrl+c': 'copy',
    'meta+c': 'copy',
    'ctrl+v': 'paste',
    'meta+v': 'paste',
    'ctrl+x': 'cut',
    'meta+x': 'cut',
    'ctrl+a': 'selectAll',
    'meta+a': 'selectAll',
    'ctrl+s': 'save',
    'meta+s': 'save',
    'ctrl+shift+s': 'saveAs',
    'meta+shift+s': 'saveAs',
    'ctrl+n': 'new',
    'meta+n': 'new',
    'ctrl+shift+c': 'copyMarkdown',
    'meta+shift+c': 'copyMarkdown',
    'ctrl+shift+v': 'pasteMarkdown',
    'meta+shift+v': 'pasteMarkdown',
    'Delete': 'delete',
    'Backspace': 'delete',
    'Escape': 'deselect',
    'v': 'tool:select',
    't': 'tool:text',
    'l': 'tool:line',
    'a': 'tool:arrow',
    'e': 'tool:eraser',
    'r': 'rotate',
};

// Tool definitions
const TOOL_DEFS = [
    { id: 'select', label: 'Select', shortcut: 'V', icon: '⊹' },
    { id: 'text', label: 'Text', shortcut: 'T', icon: 'T' },
    { id: 'line', label: 'Line', shortcut: 'L', icon: '━' },
    { id: 'arrow', label: 'Arrow', shortcut: 'A', icon: '➜' },
    { id: 'eraser', label: 'Eraser', shortcut: 'E', icon: '⌫' },
];

// Border style names
const BORDER_STYLES = ['single', 'heavy', 'double', 'rounded', 'ascii'];

// --- utils/boxdraw.js ---
// === Box-Drawing Character Lookup Tables ===
// BORDER_CHARS[style][position] → character
// Positions: tl, t, tr, l, r, bl, b, br, h, v, cross, tee_down, tee_up, tee_right, tee_left

const BORDER_CHARS = {
    single: {
        tl: '┌', t: '─', tr: '┐',
        l: '│', r: '│',
        bl: '└', b: '─', br: '┘',
        h: '─', v: '│',
        cross: '┼',
        tee_down: '┬', tee_up: '┴',
        tee_right: '├', tee_left: '┤',
    },
    heavy: {
        tl: '┏', t: '━', tr: '┓',
        l: '┃', r: '┃',
        bl: '┗', b: '━', br: '┛',
        h: '━', v: '┃',
        cross: '╋',
        tee_down: '┳', tee_up: '┻',
        tee_right: '┣', tee_left: '┫',
    },
    double: {
        tl: '╔', t: '═', tr: '╗',
        l: '║', r: '║',
        bl: '╚', b: '═', br: '╝',
        h: '═', v: '║',
        cross: '╬',
        tee_down: '╦', tee_up: '╩',
        tee_right: '╠', tee_left: '╣',
    },
    rounded: {
        tl: '╭', t: '─', tr: '╮',
        l: '│', r: '│',
        bl: '╰', b: '─', br: '╯',
        h: '─', v: '│',
        cross: '┼',
        tee_down: '┬', tee_up: '┴',
        tee_right: '├', tee_left: '┤',
    },
    ascii: {
        tl: '+', t: '-', tr: '+',
        l: '|', r: '|',
        bl: '+', b: '-', br: '+',
        h: '-', v: '|',
        cross: '+',
        tee_down: '+', tee_up: '+',
        tee_right: '+', tee_left: '+',
    },
};

// Arrow characters for line endings
const ARROW_CHARS = {
    right: '→',
    left: '←',
    up: '↑',
    down: '↓',
};

// Helper: safe char set — only writes if within bounds
function _safeSet(chars, r, c, ch) {
    if (r >= 0 && r < chars.length && c >= 0 && c < chars[r].length) {
        chars[r][c] = ch;
    }
}

// Helper: draw a box outline onto a 2D char array
function drawBox(chars, x, y, w, h, style = 'single') {
    const bc = BORDER_CHARS[style] || BORDER_CHARS.single;
    if (w < 2 || h < 2) return;

    // Top edge
    _safeSet(chars, y, x, bc.tl);
    for (let c = x + 1; c < x + w - 1; c++) _safeSet(chars, y, c, bc.t);
    _safeSet(chars, y, x + w - 1, bc.tr);

    // Sides
    for (let r = y + 1; r < y + h - 1; r++) {
        _safeSet(chars, r, x, bc.l);
        _safeSet(chars, r, x + w - 1, bc.r);
    }

    // Bottom edge
    _safeSet(chars, y + h - 1, x, bc.bl);
    for (let c = x + 1; c < x + w - 1; c++) _safeSet(chars, y + h - 1, c, bc.b);
    _safeSet(chars, y + h - 1, x + w - 1, bc.br);
}

// Helper: draw a horizontal divider across a box
function drawHDivider(chars, x, w, row, style = 'single') {
    const bc = BORDER_CHARS[style] || BORDER_CHARS.single;
    if (row < 0 || row >= chars.length) return;
    _safeSet(chars, row, x, bc.tee_right);
    for (let c = x + 1; c < x + w - 1; c++) _safeSet(chars, row, c, bc.h);
    _safeSet(chars, row, x + w - 1, bc.tee_left);
}

// Helper: draw a vertical divider down a box
function drawVDivider(chars, col, y, h, style = 'single') {
    const bc = BORDER_CHARS[style] || BORDER_CHARS.single;
    if (col < 0 || (chars.length > 0 && col >= chars[0].length)) return;
    _safeSet(chars, y, col, bc.tee_down);
    for (let r = y + 1; r < y + h - 1; r++) _safeSet(chars, r, col, bc.v);
    _safeSet(chars, y + h - 1, col, bc.tee_up);
}

// Bresenham's line algorithm — returns array of {x, y} points
function bresenhamLine(x0, y0, x1, y1) {
    const points = [];
    const dx = Math.abs(x1 - x0);
    const dy = Math.abs(y1 - y0);
    const sx = x0 < x1 ? 1 : -1;
    const sy = y0 < y1 ? 1 : -1;
    let err = dx - dy;
    let cx = x0, cy = y0;

    while (true) {
        points.push({ x: cx, y: cy });
        if (cx === x1 && cy === y1) break;
        const e2 = 2 * err;
        if (e2 > -dy) { err -= dy; cx += sx; }
        if (e2 < dx) { err += dx; cy += sy; }
    }
    return points;
}

// Pick ASCII char for a line segment based on local direction
function lineCharAt(points, i) {
    let dx, dy;
    if (i < points.length - 1) {
        dx = points[i + 1].x - points[i].x;
        dy = points[i + 1].y - points[i].y;
    } else if (i > 0) {
        dx = points[i].x - points[i - 1].x;
        dy = points[i].y - points[i - 1].y;
    } else {
        return '─';
    }
    if (dy === 0) return '─';
    if (dx === 0) return '│';
    if ((dx > 0 && dy > 0) || (dx < 0 && dy < 0)) return '\\';
    return '/';
}

// Pick arrowhead char based on direction at the endpoint
function arrowHeadChar(points, atEnd) {
    let dx, dy;
    if (atEnd) {
        const n = points.length;
        if (n < 2) return '>';
        dx = points[n - 1].x - points[n - 2].x;
        dy = points[n - 1].y - points[n - 2].y;
    } else {
        if (points.length < 2) return '<';
        dx = points[0].x - points[1].x;
        dy = points[0].y - points[1].y;
    }
    if (Math.abs(dx) > Math.abs(dy)) return dx > 0 ? '>' : '<';
    if (Math.abs(dy) > Math.abs(dx)) return dy > 0 ? 'v' : '^';
    // True 45° diagonal — use horizontal arrow
    return dx > 0 ? '>' : '<';
}

// === Box-Drawing Character Merge (4-direction: U/D/L/R) ===
// When two box-drawing chars overlap (e.g. adjacent components sharing a border),
// merge their cardinal directions to produce the correct intersection character
// (corners → tees, tees → crosses, etc.)

const _BD_U = 1, _BD_D = 2, _BD_L = 4, _BD_R = 8;

// Direction flags for each BORDER_CHARS position
const _BD_POS_DIRS = {
    tl: _BD_D | _BD_R,  tr: _BD_D | _BD_L,
    bl: _BD_U | _BD_R,  br: _BD_U | _BD_L,
    t: _BD_L | _BD_R,   b: _BD_L | _BD_R,
    l: _BD_U | _BD_D,   r: _BD_U | _BD_D,
    h: _BD_L | _BD_R,   v: _BD_U | _BD_D,
    cross:     _BD_U | _BD_D | _BD_L | _BD_R,
    tee_down:  _BD_D | _BD_L | _BD_R,
    tee_up:    _BD_U | _BD_L | _BD_R,
    tee_right: _BD_U | _BD_D | _BD_R,
    tee_left:  _BD_U | _BD_D | _BD_L,
};

// Build lookup tables from BORDER_CHARS
const _BOX_DIRS = {};      // char → direction flags (OR'd across all positions)
const _BOX_STYLE = {};     // char → first style name that defines it
const _BOX_RESULTS = {};   // style → { dirFlags → char }

for (const style of Object.keys(BORDER_CHARS)) {
    const chars = BORDER_CHARS[style];
    const resultMap = {};
    for (const [pos, ch] of Object.entries(chars)) {
        const dirs = _BD_POS_DIRS[pos];
        if (dirs === undefined) continue;
        _BOX_DIRS[ch] = (_BOX_DIRS[ch] || 0) | dirs;
        if (!_BOX_STYLE[ch]) _BOX_STYLE[ch] = style;
        resultMap[dirs] = ch;
    }
    // Fill single-direction combos (no standard position maps to just U, D, L, or R)
    resultMap[_BD_L] = resultMap[_BD_L] || chars.h;
    resultMap[_BD_R] = resultMap[_BD_R] || chars.h;
    resultMap[_BD_U] = resultMap[_BD_U] || chars.v;
    resultMap[_BD_D] = resultMap[_BD_D] || chars.v;
    resultMap[_BD_L | _BD_R] = resultMap[_BD_L | _BD_R] || chars.h;
    resultMap[_BD_U | _BD_D] = resultMap[_BD_U | _BD_D] || chars.v;
    _BOX_RESULTS[style] = resultMap;
}

// === Diagonal Line Intersection Merging (for freehand / line / arrow tool) ===
const _LINE_DIR_H = 1;
const _LINE_DIR_V = 2;
const _LINE_DIR_D = 4;  // /
const _LINE_DIR_B = 8;  // \

const _PUA_HD  = '\uE001';
const _PUA_HB  = '\uE002';
const _PUA_VD  = '\uE003';
const _PUA_VB  = '\uE004';
const _PUA_HVD = '\uE005';
const _PUA_HVB = '\uE006';
const _PUA_HDB = '\uE007';
const _PUA_VDB = '\uE008';

const _LINE_CHAR_DIRS = {
    '-': _LINE_DIR_H, '>': _LINE_DIR_H, '<': _LINE_DIR_H,
    '|': _LINE_DIR_V, '^': _LINE_DIR_V, 'v': _LINE_DIR_V,
    '/': _LINE_DIR_D,
    '\\': _LINE_DIR_B,
    '+': _LINE_DIR_H | _LINE_DIR_V,
    'X': _LINE_DIR_D | _LINE_DIR_B,
    '*': _LINE_DIR_H | _LINE_DIR_V | _LINE_DIR_D | _LINE_DIR_B,
    [_PUA_HD]:  _LINE_DIR_H | _LINE_DIR_D,
    [_PUA_HB]:  _LINE_DIR_H | _LINE_DIR_B,
    [_PUA_VD]:  _LINE_DIR_V | _LINE_DIR_D,
    [_PUA_VB]:  _LINE_DIR_V | _LINE_DIR_B,
    [_PUA_HVD]: _LINE_DIR_H | _LINE_DIR_V | _LINE_DIR_D,
    [_PUA_HVB]: _LINE_DIR_H | _LINE_DIR_V | _LINE_DIR_B,
    [_PUA_HDB]: _LINE_DIR_H | _LINE_DIR_D | _LINE_DIR_B,
    [_PUA_VDB]: _LINE_DIR_V | _LINE_DIR_D | _LINE_DIR_B,
};

const _DIR_RESULT = {
    [_LINE_DIR_H]: '-',
    [_LINE_DIR_V]: '|',
    [_LINE_DIR_D]: '/',
    [_LINE_DIR_B]: '\\',
    [_LINE_DIR_H | _LINE_DIR_V]: '+',
    [_LINE_DIR_D | _LINE_DIR_B]: 'X',
    [_LINE_DIR_H | _LINE_DIR_D]: _PUA_HD,
    [_LINE_DIR_H | _LINE_DIR_B]: _PUA_HB,
    [_LINE_DIR_V | _LINE_DIR_D]: _PUA_VD,
    [_LINE_DIR_V | _LINE_DIR_B]: _PUA_VB,
    [_LINE_DIR_H | _LINE_DIR_V | _LINE_DIR_D]: _PUA_HVD,
    [_LINE_DIR_H | _LINE_DIR_V | _LINE_DIR_B]: _PUA_HVB,
    [_LINE_DIR_H | _LINE_DIR_D | _LINE_DIR_B]: _PUA_HDB,
    [_LINE_DIR_V | _LINE_DIR_D | _LINE_DIR_B]: _PUA_VDB,
    [_LINE_DIR_H | _LINE_DIR_V | _LINE_DIR_D | _LINE_DIR_B]: '*',
};

const _PUA_DISPLAY = {
    [_PUA_HD]: '+', [_PUA_HB]: '+', [_PUA_VD]: '+', [_PUA_VB]: '+',
    [_PUA_HVD]: '*', [_PUA_HVB]: '*', [_PUA_HDB]: '*', [_PUA_VDB]: '*',
};

// Merge two characters that overlap on the grid.
// 1) Box-drawing merge: combines U/D/L/R directions → correct Unicode junction
// 2) Diagonal merge: combines H/V/D/B for freehand ASCII lines
// 3) Fallback: incoming overwrites existing
function mergeLineChars(existing, incoming) {
    // Try box-drawing merge (corners/tees/crosses)
    const eDirs = _BOX_DIRS[existing];
    const iDirs = _BOX_DIRS[incoming];
    if (eDirs !== undefined && iDirs !== undefined) {
        const combined = eDirs | iDirs;
        if (combined === iDirs) return incoming; // incoming already covers all directions
        const style = _BOX_STYLE[incoming] || 'single';
        const result = _BOX_RESULTS[style][combined];
        if (result) return result;
    }

    // Fall back to diagonal line merge (for /, \, arrows, PUA combos)
    const ed = _LINE_CHAR_DIRS[existing];
    const id = _LINE_CHAR_DIRS[incoming];
    if (ed === undefined || id === undefined) return incoming;
    if (ed === id) return incoming;
    const combined = ed | id;
    return _DIR_RESULT[combined] || incoming;
}

// Helper: place text into char array, truncating to fit
function placeText(chars, x, y, text, maxWidth) {
    if (y < 0 || y >= chars.length) return;
    const row = chars[y];
    const len = Math.min(text.length, maxWidth || row.length - x);
    for (let i = 0; i < len; i++) {
        const col = x + i;
        if (col >= 0 && col < row.length) {
            row[col] = text[i];
        }
    }
}

// --- core/grid.js ---
// === CharGrid: 2D character buffer with compositing ===

class CharGrid {
    constructor(cols = GRID_COLS, rows = GRID_ROWS) {
        this.cols = cols;
        this.rows = rows;
        this.cells = this._createEmpty();
    }

    _createEmpty() {
        const cells = [];
        for (let r = 0; r < this.rows; r++) {
            cells.push(new Array(this.cols).fill(' '));
        }
        return cells;
    }

    clear() {
        for (let r = 0; r < this.rows; r++) {
            for (let c = 0; c < this.cols; c++) {
                this.cells[r][c] = ' ';
            }
        }
    }

    getChar(col, row) {
        if (row >= 0 && row < this.rows && col >= 0 && col < this.cols) {
            return this.cells[row][col];
        }
        return ' ';
    }

    setChar(col, row, ch) {
        if (row >= 0 && row < this.rows && col >= 0 && col < this.cols) {
            this.cells[row][col] = ch;
        }
    }

    // Composite components onto grid (space = transparent)
    composite(components) {
        this.clear();
        // Sort by zIndex ascending (lowest first = drawn first)
        const sorted = [...components].sort((a, b) => a.zIndex - b.zIndex);
        for (const comp of sorted) {
            const rendered = comp.render();
            if (!rendered) continue;
            this._blit(rendered, comp.x, comp.y);
        }
    }

    // Blit a 2D char array onto the grid (space = transparent, line chars merge)
    _blit(charArray, offsetX, offsetY) {
        for (let r = 0; r < charArray.length; r++) {
            const gridRow = offsetY + r;
            if (gridRow < 0 || gridRow >= this.rows) continue;
            const srcRow = charArray[r];
            for (let c = 0; c < srcRow.length; c++) {
                const gridCol = offsetX + c;
                if (gridCol < 0 || gridCol >= this.cols) continue;
                const incoming = srcRow[c];
                if (incoming !== ' ') {
                    const existing = this.cells[gridRow][gridCol];
                    this.cells[gridRow][gridCol] = (existing !== ' ')
                        ? mergeLineChars(existing, incoming)
                        : incoming;
                }
            }
        }
    }

    // Export as plain text string (replaces internal PUA chars with display equivalents)
    toText() {
        return this.cells.map(row =>
            row.map(ch => _PUA_DISPLAY[ch] || ch).join('').trimEnd()
        ).join('\n');
    }

    // Export as markdown code block
    toMarkdown() {
        return '```\n' + this.toText() + '\n```';
    }

    // Resize the grid
    resize(newCols, newRows) {
        const newCells = [];
        for (let r = 0; r < newRows; r++) {
            const row = new Array(newCols).fill(' ');
            if (r < this.rows) {
                for (let c = 0; c < Math.min(newCols, this.cols); c++) {
                    row[c] = this.cells[r][c];
                }
            }
            newCells.push(row);
        }
        this.cols = newCols;
        this.rows = newRows;
        this.cells = newCells;
    }
}

// --- core/renderer.js ---
// === CanvasRenderer: draws CharGrid onto HTML5 Canvas ===

// Box-drawing characters → direction flags (t=top, b=bottom, l=left, r=right)
// Used to render these chars with canvas lines instead of fillText for seamless connections
const _CANVAS_BOX_DIRS = {
    // Single
    '─': 'lr', '│': 'tb',
    '┌': 'rb', '┐': 'lb', '└': 'rt', '┘': 'lt',
    '├': 'trb', '┤': 'tlb', '┬': 'lrb', '┴': 'lrt', '┼': 'tlrb',
    // Heavy
    '━': 'lr', '┃': 'tb',
    '┏': 'rb', '┓': 'lb', '┗': 'rt', '┛': 'lt',
    '┣': 'trb', '┫': 'tlb', '┳': 'lrb', '┻': 'lrt', '╋': 'tlrb',
    // Double
    '═': 'lr', '║': 'tb',
    '╔': 'rb', '╗': 'lb', '╚': 'rt', '╝': 'lt',
    '╠': 'trb', '╣': 'tlb', '╦': 'lrb', '╩': 'lrt', '╬': 'tlrb',
    // Rounded (straight lines, same geometry as single)
    '╭': 'rb', '╮': 'lb', '╰': 'rt', '╯': 'lt',
};

const _BOX_HEAVY = new Set('━┃┏┓┗┛┣┫┳┻╋'.split(''));
const _BOX_DOUBLE = new Set('═║╔╗╚╝╠╣╦╩╬'.split(''));

// Diagonal and intersection characters → flags: f=forward(/), b=back(\), h=horiz, v=vert
const _CANVAS_DIAG_CHARS = {
    '/': 'f', '\\': 'b',
    '+': 'hv', 'X': 'fb', '*': 'hvfb',
    // PUA chars for unique direction combos (from mergeLineChars)
    '\uE001': 'hf',    // H|D
    '\uE002': 'hb',    // H|B
    '\uE003': 'vf',    // V|D
    '\uE004': 'vb',    // V|B
    '\uE005': 'hvf',   // H|V|D
    '\uE006': 'hvb',   // H|V|B
    '\uE007': 'hfb',   // H|D|B
    '\uE008': 'vfb',   // V|D|B
};

class CanvasRenderer {
    constructor(canvas) {
        this.canvas = canvas;
        this.ctx = canvas.getContext('2d');
        this.charWidth = 0;
        this.charHeight = 0;
        this.fontSize = DEFAULT_FONT_SIZE;
        this.fontFamily = DEFAULT_FONT_FAMILY;
        this._measureFont();
    }

    _measureFont() {
        this.ctx.font = `${this.fontSize}px ${this.fontFamily}`;
        const m = this.ctx.measureText('M');
        this._fontCharWidth = Math.ceil(m.width);
        // Square cells: use font size as cell dimension
        const cellSize = this.fontSize + 2;
        this.charWidth = cellSize;
        this.charHeight = cellSize;
    }

    // Get total pixel dimensions for a grid
    getGridPixelSize(cols, rows) {
        return {
            width: cols * this.charWidth,
            height: rows * this.charHeight,
        };
    }

    // Resize canvas to fit grid
    resizeToGrid(cols, rows) {
        const dpr = window.devicePixelRatio || 1;
        const size = this.getGridPixelSize(cols, rows);
        this.canvas.width = size.width * dpr;
        this.canvas.height = size.height * dpr;
        this.canvas.style.width = size.width + 'px';
        this.canvas.style.height = size.height + 'px';
        this.ctx.setTransform(dpr, 0, 0, dpr, 0, 0);
        this._measureFont();
    }

    // Convert pixel position to grid coordinates
    pixelToGrid(px, py) {
        return {
            col: Math.floor(px / this.charWidth),
            row: Math.floor(py / this.charHeight),
        };
    }

    // Render the full grid
    render(grid, overlays = {}) {
        const ctx = this.ctx;
        const cw = this.charWidth;
        const ch = this.charHeight;
        const cols = grid.cols;
        const rows = grid.rows;

        // Background
        ctx.fillStyle = COLORS.cellBg;
        ctx.fillRect(0, 0, cols * cw, rows * ch);

        // Grid lines (subtle)
        ctx.strokeStyle = COLORS.gridLine;
        ctx.lineWidth = 0.5;
        for (let c = 0; c <= cols; c++) {
            ctx.beginPath();
            ctx.moveTo(c * cw, 0);
            ctx.lineTo(c * cw, rows * ch);
            ctx.stroke();
        }
        for (let r = 0; r <= rows; r++) {
            ctx.beginPath();
            ctx.moveTo(0, r * ch);
            ctx.lineTo(cols * cw, r * ch);
            ctx.stroke();
        }

        // Characters (centered in square cells)
        ctx.font = `${this.fontSize}px ${this.fontFamily}`;
        ctx.textBaseline = 'top';
        ctx.fillStyle = COLORS.text;
        const xPad = Math.floor((cw - this._fontCharWidth) / 2);
        const yPad = Math.floor((ch - this.fontSize) / 2);
        for (let r = 0; r < rows; r++) {
            for (let c = 0; c < cols; c++) {
                const ch_ = grid.getChar(c, r);
                if (ch_ !== ' ') {
                    if (!this._drawBoxChar(c, r, ch_)) {
                        ctx.fillStyle = COLORS.text;
                        ctx.fillText(ch_, c * cw + xPad, r * ch + yPad);
                    }
                }
            }
        }

        // Overlays
        if (overlays.cursor) {
            this._drawCursor(overlays.cursor.col, overlays.cursor.row);
        }
        if (overlays.selection) {
            this._drawSelection(overlays.selection);
        }
        if (overlays.selections) {
            for (const sel of overlays.selections) {
                this._drawSelection(sel);
            }
        }
        if (overlays.handles) {
            for (const h of overlays.handles) {
                this._drawHandle(h.col, h.row);
            }
        }
        if (overlays.selectionRect) {
            this._drawSelectionRect(overlays.selectionRect);
        }
        if (overlays.drawPreview) {
            this._drawPreviewCells(overlays.drawPreview);
        }
        if (overlays.linePreview) {
            this._drawLinePreview(overlays.linePreview);
        }
    }

    // Draw a box-drawing or line character using canvas lines (returns true if handled)
    _drawBoxChar(col, row, ch_) {
        const dirs = _CANVAS_BOX_DIRS[ch_];
        if (dirs) {
            if (_BOX_DOUBLE.has(ch_)) {
                this._drawDoubleBox(col, row, ch_);
            } else {
                this._drawSingleBox(col, row, dirs, _BOX_HEAVY.has(ch_));
            }
            return true;
        }
        // Diagonal and intersection characters
        const diag = _CANVAS_DIAG_CHARS[ch_];
        if (diag) {
            this._drawDiagChar(col, row, diag);
            return true;
        }
        return false;
    }

    // Draw single/heavy/rounded box char with one line per direction
    _drawSingleBox(col, row, dirs, isHeavy) {
        const ctx = this.ctx;
        const cw = this.charWidth;
        const ch = this.charHeight;
        const x = col * cw;
        const y = row * ch;
        const cx = Math.floor(x + cw / 2) + 0.5;
        const cy = Math.floor(y + ch / 2) + 0.5;

        ctx.strokeStyle = COLORS.text;
        ctx.lineWidth = isHeavy ? 2.5 : 1;
        ctx.lineCap = 'square';
        ctx.beginPath();

        if (dirs.includes('t')) { ctx.moveTo(cx, y); ctx.lineTo(cx, cy); }
        if (dirs.includes('b')) { ctx.moveTo(cx, cy); ctx.lineTo(cx, y + ch); }
        if (dirs.includes('l')) { ctx.moveTo(x, cy); ctx.lineTo(cx, cy); }
        if (dirs.includes('r')) { ctx.moveTo(cx, cy); ctx.lineTo(x + cw, cy); }

        ctx.stroke();
    }

    // Draw diagonal / intersection characters with canvas lines
    _drawDiagChar(col, row, flags) {
        const ctx = this.ctx;
        const cw = this.charWidth;
        const ch = this.charHeight;
        const x = col * cw;
        const y = row * ch;
        const cx = Math.floor(x + cw / 2) + 0.5;
        const cy = Math.floor(y + ch / 2) + 0.5;

        ctx.strokeStyle = COLORS.text;
        ctx.lineWidth = 1;
        ctx.lineCap = 'square';
        ctx.beginPath();

        if (flags.includes('f')) { ctx.moveTo(x, y + ch); ctx.lineTo(x + cw, y); }
        if (flags.includes('b')) { ctx.moveTo(x, y); ctx.lineTo(x + cw, y + ch); }
        if (flags.includes('h')) { ctx.moveTo(x, cy); ctx.lineTo(x + cw, cy); }
        if (flags.includes('v')) { ctx.moveTo(cx, y); ctx.lineTo(cx, y + ch); }

        ctx.stroke();
    }

    // Draw double box char with two parallel lines per direction
    _drawDoubleBox(col, row, ch_) {
        const ctx = this.ctx;
        const cw = this.charWidth;
        const chh = this.charHeight;
        const x = col * cw;
        const y = row * chh;
        const cx = Math.floor(x + cw / 2) + 0.5;
        const cy = Math.floor(y + chh / 2) + 0.5;
        const g = Math.max(2, Math.floor(cw / 6));
        const r = x + cw;
        const b = y + chh;

        ctx.strokeStyle = COLORS.text;
        ctx.lineWidth = 1;
        ctx.lineCap = 'square';
        ctx.beginPath();

        switch (ch_) {
            case '═':
                ctx.moveTo(x, cy-g); ctx.lineTo(r, cy-g);
                ctx.moveTo(x, cy+g); ctx.lineTo(r, cy+g);
                break;
            case '║':
                ctx.moveTo(cx-g, y); ctx.lineTo(cx-g, b);
                ctx.moveTo(cx+g, y); ctx.lineTo(cx+g, b);
                break;
            case '╔':
                ctx.moveTo(cx-g, cy-g); ctx.lineTo(r, cy-g);
                ctx.moveTo(cx-g, cy-g); ctx.lineTo(cx-g, b);
                ctx.moveTo(cx+g, cy+g); ctx.lineTo(r, cy+g);
                ctx.moveTo(cx+g, cy+g); ctx.lineTo(cx+g, b);
                break;
            case '╗':
                ctx.moveTo(x, cy-g); ctx.lineTo(cx+g, cy-g);
                ctx.moveTo(cx+g, cy-g); ctx.lineTo(cx+g, b);
                ctx.moveTo(x, cy+g); ctx.lineTo(cx-g, cy+g);
                ctx.moveTo(cx-g, cy+g); ctx.lineTo(cx-g, b);
                break;
            case '╚':
                ctx.moveTo(cx-g, y); ctx.lineTo(cx-g, cy+g);
                ctx.moveTo(cx-g, cy+g); ctx.lineTo(r, cy+g);
                ctx.moveTo(cx+g, y); ctx.lineTo(cx+g, cy-g);
                ctx.moveTo(cx+g, cy-g); ctx.lineTo(r, cy-g);
                break;
            case '╝':
                ctx.moveTo(cx+g, y); ctx.lineTo(cx+g, cy+g);
                ctx.moveTo(x, cy+g); ctx.lineTo(cx+g, cy+g);
                ctx.moveTo(cx-g, y); ctx.lineTo(cx-g, cy-g);
                ctx.moveTo(x, cy-g); ctx.lineTo(cx-g, cy-g);
                break;
            case '╠':
                ctx.moveTo(cx-g, y); ctx.lineTo(cx-g, b);
                ctx.moveTo(cx+g, y); ctx.lineTo(cx+g, b);
                ctx.moveTo(cx-g, cy-g); ctx.lineTo(r, cy-g);
                ctx.moveTo(cx-g, cy+g); ctx.lineTo(r, cy+g);
                break;
            case '╣':
                ctx.moveTo(cx-g, y); ctx.lineTo(cx-g, b);
                ctx.moveTo(cx+g, y); ctx.lineTo(cx+g, b);
                ctx.moveTo(x, cy-g); ctx.lineTo(cx+g, cy-g);
                ctx.moveTo(x, cy+g); ctx.lineTo(cx+g, cy+g);
                break;
            case '╦':
                ctx.moveTo(x, cy-g); ctx.lineTo(r, cy-g);
                ctx.moveTo(x, cy+g); ctx.lineTo(r, cy+g);
                ctx.moveTo(cx-g, cy-g); ctx.lineTo(cx-g, b);
                ctx.moveTo(cx+g, cy-g); ctx.lineTo(cx+g, b);
                break;
            case '╩':
                ctx.moveTo(x, cy-g); ctx.lineTo(r, cy-g);
                ctx.moveTo(x, cy+g); ctx.lineTo(r, cy+g);
                ctx.moveTo(cx-g, y); ctx.lineTo(cx-g, cy+g);
                ctx.moveTo(cx+g, y); ctx.lineTo(cx+g, cy+g);
                break;
            case '╬':
                ctx.moveTo(cx-g, y); ctx.lineTo(cx-g, b);
                ctx.moveTo(cx+g, y); ctx.lineTo(cx+g, b);
                ctx.moveTo(x, cy-g); ctx.lineTo(r, cy-g);
                ctx.moveTo(x, cy+g); ctx.lineTo(r, cy+g);
                break;
        }

        ctx.stroke();
    }

    _drawCursor(col, row) {
        const ctx = this.ctx;
        ctx.strokeStyle = COLORS.cursor;
        ctx.lineWidth = 1;
        ctx.setLineDash([3, 3]);
        ctx.strokeRect(
            col * this.charWidth, row * this.charHeight,
            this.charWidth, this.charHeight
        );
        ctx.setLineDash([]);
    }

    _drawSelection(rect) {
        const ctx = this.ctx;
        const x = rect.x * this.charWidth;
        const y = rect.y * this.charHeight;
        const w = rect.w * this.charWidth;
        const h = rect.h * this.charHeight;
        ctx.fillStyle = COLORS.selection;
        ctx.fillRect(x, y, w, h);
        ctx.strokeStyle = COLORS.selectionBorder;
        ctx.lineWidth = 1;
        ctx.setLineDash([4, 4]);
        ctx.strokeRect(x, y, w, h);
        ctx.setLineDash([]);
    }

    _drawHandle(col, row) {
        const ctx = this.ctx;
        const cx = col * this.charWidth + this.charWidth / 2;
        const cy = row * this.charHeight + this.charHeight / 2;
        const r = 3;
        ctx.fillStyle = COLORS.handleFill;
        ctx.strokeStyle = COLORS.handle;
        ctx.lineWidth = 1.5;
        ctx.beginPath();
        ctx.arc(cx, cy, r, 0, Math.PI * 2);
        ctx.fill();
        ctx.stroke();
    }

    _drawSelectionRect(rect) {
        const ctx = this.ctx;
        const x = rect.x * this.charWidth;
        const y = rect.y * this.charHeight;
        const w = rect.w * this.charWidth;
        const h = rect.h * this.charHeight;
        ctx.strokeStyle = COLORS.accent;
        ctx.lineWidth = 1;
        ctx.setLineDash([2, 2]);
        ctx.strokeRect(x, y, w, h);
        ctx.setLineDash([]);
    }

    _drawPreviewCells(cells) {
        const ctx = this.ctx;
        ctx.fillStyle = 'rgba(166, 227, 161, 0.3)';
        for (const { col, row } of cells) {
            ctx.fillRect(
                col * this.charWidth, row * this.charHeight,
                this.charWidth, this.charHeight
            );
        }
    }

    _drawLinePreview(p) {
        const ctx = this.ctx;
        const x = p.x * this.charWidth;
        const y = p.y * this.charHeight;
        const w = p.w * this.charWidth;
        const h = p.h * this.charHeight;
        ctx.fillStyle = 'rgba(137, 180, 250, 0.2)';
        ctx.fillRect(x, y, w, h);
        ctx.strokeStyle = '#89b4fa';
        ctx.lineWidth = 1;
        ctx.setLineDash([3, 3]);
        ctx.strokeRect(x, y, w, h);
        ctx.setLineDash([]);
    }
}

// --- core/history.js ---
// === UndoManager: snapshot-based undo/redo ===

class UndoManager {
    constructor(maxLevels = MAX_UNDO_LEVELS) {
        this.maxLevels = maxLevels;
        this.undoStack = [];
        this.redoStack = [];
    }

    // Save a snapshot (deep clone of component array)
    push(components) {
        const snapshot = this._serialize(components);
        this.undoStack.push(snapshot);
        if (this.undoStack.length > this.maxLevels) {
            this.undoStack.shift();
        }
        // Any new action clears the redo stack
        this.redoStack = [];
    }

    // Undo: pop from undo stack, push current state to redo
    undo(currentComponents) {
        if (this.undoStack.length === 0) return null;
        const currentSnapshot = this._serialize(currentComponents);
        this.redoStack.push(currentSnapshot);
        const snapshot = this.undoStack.pop();
        return this._deserialize(snapshot);
    }

    // Redo: pop from redo stack, push current state to undo
    redo(currentComponents) {
        if (this.redoStack.length === 0) return null;
        const currentSnapshot = this._serialize(currentComponents);
        this.undoStack.push(currentSnapshot);
        const snapshot = this.redoStack.pop();
        return this._deserialize(snapshot);
    }

    canUndo() { return this.undoStack.length > 0; }
    canRedo() { return this.redoStack.length > 0; }

    clear() {
        this.undoStack = [];
        this.redoStack = [];
    }

    _serialize(components) {
        return JSON.stringify(components.map(c => c.serialize()));
    }

    _deserialize(snapshot) {
        const data = JSON.parse(snapshot);
        return data.map(d => ComponentRegistry.deserialize(d));
    }
}

// --- core/export.js ---
// === Export utilities ===

const ExportUtils = {
    // Copy text to clipboard
    async copyToClipboard(text) {
        try {
            await navigator.clipboard.writeText(text);
            return true;
        } catch {
            // Fallback for older browsers
            const ta = document.createElement('textarea');
            ta.value = text;
            ta.style.position = 'fixed';
            ta.style.left = '-9999px';
            document.body.appendChild(ta);
            ta.select();
            const ok = document.execCommand('copy');
            document.body.removeChild(ta);
            return ok;
        }
    },

    // Save project to a JSON file
    saveToFile(components, filename = 'wireframe.kaomoji.json') {
        const data = {
            version: 1,
            gridCols: GRID_COLS,
            gridRows: GRID_ROWS,
            components: components.map(c => c.serialize()),
            timestamp: new Date().toISOString(),
        };
        const blob = new Blob([JSON.stringify(data, null, 2)], { type: 'application/json' });
        const url = URL.createObjectURL(blob);
        const a = document.createElement('a');
        a.href = url;
        a.download = filename;
        a.click();
        URL.revokeObjectURL(url);
    },

    // Load project from a JSON file (returns Promise<Component[]>)
    loadFromFile() {
        return new Promise((resolve, reject) => {
            const input = document.createElement('input');
            input.type = 'file';
            input.accept = '.json';
            input.onchange = (e) => {
                const file = e.target.files[0];
                if (!file) { reject(new Error('No file selected')); return; }
                const reader = new FileReader();
                reader.onload = (ev) => {
                    try {
                        const data = JSON.parse(ev.target.result);
                        if (data.version !== 1) {
                            reject(new Error('Unsupported file version'));
                            return;
                        }
                        const components = data.components.map(d => ComponentRegistry.deserialize(d));
                        resolve(components);
                    } catch (err) {
                        reject(err);
                    }
                };
                reader.onerror = () => reject(reader.error);
                reader.readAsText(file);
            };
            input.click();
        });
    },

    // Save to localStorage
    saveToLocalStorage(components, key = 'kaomoji_project') {
        const data = {
            version: 1,
            gridCols: GRID_COLS,
            gridRows: GRID_ROWS,
            components: components.map(c => c.serialize()),
            timestamp: new Date().toISOString(),
        };
        localStorage.setItem(key, JSON.stringify(data));
    },

    // Load from localStorage
    loadFromLocalStorage(key = 'kaomoji_project') {
        const raw = localStorage.getItem(key);
        if (!raw) return null;
        try {
            const data = JSON.parse(raw);
            if (data.version !== 1) return null;
            return data.components.map(d => ComponentRegistry.deserialize(d));
        } catch {
            return null;
        }
    },

    // Export as plain text (trimmed)
    exportAsText(grid) {
        const lines = grid.toText().split('\n');
        // Trim trailing empty lines
        while (lines.length > 0 && lines[lines.length - 1].trim() === '') {
            lines.pop();
        }
        return lines.join('\n');
    },

    // Export as markdown code block
    exportAsMarkdown(grid) {
        return '```\n' + this.exportAsText(grid) + '\n```';
    },
};

// --- components/base.js ---
// === BaseComponent: abstract class for all components ===

let _componentIdCounter = 0;

class BaseComponent {
    constructor(type, x, y, w, h, props = {}) {
        this.id = ++_componentIdCounter;
        this.type = type;
        this.x = x;
        this.y = y;
        this.w = w;
        this.h = h;
        this.zIndex = 0;
        this.visible = true;
        this.locked = false;
        this.name = props.name || `${type}_${this.id}`;
        this.borderStyle = props.borderStyle || 'single';
        this.props = { ...props };
        delete this.props.name;
        delete this.props.borderStyle;
    }

    // Render to a 2D char array (w × h). Override in subclass.
    render() {
        const chars = [];
        for (let r = 0; r < this.h; r++) {
            chars.push(new Array(this.w).fill(' '));
        }
        return chars;
    }

    // Hit test: does (col, row) land on this component?
    contains(col, row) {
        return col >= this.x && col < this.x + this.w &&
               row >= this.y && row < this.y + this.h;
    }

    // Get bounding box
    getBounds() {
        return { x: this.x, y: this.y, w: this.w, h: this.h };
    }

    // Get resize handles (8 points around bounding box)
    getHandles() {
        const { x, y, w, h } = this;
        return [
            { col: x,         row: y,         dir: 'nw' },
            { col: x + Math.floor(w/2), row: y, dir: 'n' },
            { col: x + w - 1, row: y,         dir: 'ne' },
            { col: x + w - 1, row: y + Math.floor(h/2), dir: 'e' },
            { col: x + w - 1, row: y + h - 1, dir: 'se' },
            { col: x + Math.floor(w/2), row: y + h - 1, dir: 's' },
            { col: x,         row: y + h - 1, dir: 'sw' },
            { col: x,         row: y + Math.floor(h/2), dir: 'w' },
        ];
    }

    // Check if a point is near a resize handle (returns handle dir or null)
    getHandleAt(col, row) {
        for (const h of this.getHandles()) {
            if (h.col === col && h.row === row) return h.dir;
        }
        return null;
    }

    // Minimum size (override in subclass)
    getMinSize() {
        return { minW: 1, minH: 1 };
    }

    // Serialize for undo/save
    serialize() {
        return {
            type: this.type,
            id: this.id,
            x: this.x,
            y: this.y,
            w: this.w,
            h: this.h,
            zIndex: this.zIndex,
            visible: this.visible,
            locked: this.locked,
            name: this.name,
            borderStyle: this.borderStyle,
            props: { ...this.props },
        };
    }

    // Restore from serialized data
    static fromData(data) {
        // Override in subclasses via registry
        throw new Error('Use ComponentRegistry.deserialize()');
    }

    // Apply serialized data to this instance
    applyData(data) {
        this.id = data.id;
        this.x = data.x;
        this.y = data.y;
        this.w = data.w;
        this.h = data.h;
        this.zIndex = data.zIndex;
        this.visible = data.visible !== undefined ? data.visible : true;
        this.locked = data.locked || false;
        this.name = data.name;
        this.borderStyle = data.borderStyle || 'single';
        this.props = { ...data.props };
        // Keep global counter in sync
        if (data.id >= _componentIdCounter) {
            _componentIdCounter = data.id;
        }
    }

    // Clone this component
    clone() {
        const data = this.serialize();
        data.id = ++_componentIdCounter;
        data.name = `${this.type}_${data.id}`;
        data.x += 2;
        data.y += 1;
        if (data.children && Array.isArray(data.children)) {
            for (const child of data.children) {
                child.id = ++_componentIdCounter;
                child.name = `${child.type}_${child.id}`;
                child.x += 2;
                child.y += 1;
            }
        }
        return ComponentRegistry.deserialize(data);
    }

    // Get editable properties (for inspector panel). Override in subclass.
    getEditableProps() {
        return [
            { key: 'x', label: 'X', type: 'number' },
            { key: 'y', label: 'Y', type: 'number' },
            { key: 'w', label: 'W', type: 'number' },
            { key: 'h', label: 'H', type: 'number' },
            { key: 'borderStyle', label: 'Border', type: 'select', options: BORDER_STYLES },
        ];
    }

    // Set a property value (handles both direct and props-based)
    setProp(key, value) {
        if (key in this && typeof this[key] !== 'function') {
            if (typeof this[key] === 'number') value = parseInt(value, 10) || 0;
            this[key] = value;
        } else {
            this.props[key] = value;
        }
    }

    // Get a property value
    getProp(key) {
        if (key in this && typeof this[key] !== 'function') return this[key];
        return this.props[key];
    }
}

// === Line Component: any-angle line using Bresenham ===
class LineComponent extends BaseComponent {
    constructor(x, y, w, h, props = {}) {
        super('line', x, y, w || 8, h || 1, props);
        // flipped: false = TL→BR diagonal, true = TR→BL diagonal
        if (props.flipped !== undefined) {
            this.props.flipped = props.flipped;
        } else if (props.orientation === 'vertical') {
            // Backward compat: vertical line
            this.props.flipped = false;
        } else {
            this.props.flipped = false;
        }
    }

    render() {
        const chars = [];
        for (let r = 0; r < this.h; r++) {
            chars.push(new Array(this.w).fill(' '));
        }

        // Determine endpoints within bounding box
        let x0, y0, x1, y1;
        if (this.props.flipped) {
            x0 = this.w - 1; y0 = 0;
            x1 = 0; y1 = this.h - 1;
        } else {
            x0 = 0; y0 = 0;
            x1 = this.w - 1; y1 = this.h - 1;
        }

        const points = bresenhamLine(x0, y0, x1, y1);
        for (let i = 0; i < points.length; i++) {
            const p = points[i];
            if (p.y >= 0 && p.y < this.h && p.x >= 0 && p.x < this.w) {
                chars[p.y][p.x] = lineCharAt(points, i);
            }
        }

        return chars;
    }

    getMinSize() { return { minW: 1, minH: 1 }; }

    getEditableProps() {
        return [
            ...super.getEditableProps(),
            { key: 'flipped', label: 'Flip', type: 'select', options: ['false', 'true'], propsBased: true },
        ];
    }
}

// === Arrow Component: any-angle line with arrowhead ===
class ArrowComponent extends BaseComponent {
    constructor(x, y, w, h, props = {}) {
        super('arrow', x, y, w || 8, h || 1, props);
        // flipped: false = TL→BR, true = TR→BL
        if (props.flipped !== undefined) {
            this.props.flipped = props.flipped;
        } else if (props.orientation === 'vertical') {
            this.props.flipped = false;
        } else {
            this.props.flipped = false;
        }
        // reversed: false = arrowhead at end of Bresenham, true = at start
        if (props.reversed !== undefined) {
            this.props.reversed = props.reversed;
        } else if (props.direction === 'left' || props.direction === 'up') {
            this.props.reversed = true;
        } else {
            this.props.reversed = false;
        }
    }

    render() {
        const chars = [];
        for (let r = 0; r < this.h; r++) {
            chars.push(new Array(this.w).fill(' '));
        }

        let x0, y0, x1, y1;
        if (this.props.flipped) {
            x0 = this.w - 1; y0 = 0;
            x1 = 0; y1 = this.h - 1;
        } else {
            x0 = 0; y0 = 0;
            x1 = this.w - 1; y1 = this.h - 1;
        }

        const points = bresenhamLine(x0, y0, x1, y1);
        for (let i = 0; i < points.length; i++) {
            const p = points[i];
            if (p.y >= 0 && p.y < this.h && p.x >= 0 && p.x < this.w) {
                chars[p.y][p.x] = lineCharAt(points, i);
            }
        }

        // Place arrowhead
        if (points.length >= 2) {
            const reversed = this.props.reversed;
            const headIdx = reversed ? 0 : points.length - 1;
            const hp = points[headIdx];
            if (hp.y >= 0 && hp.y < this.h && hp.x >= 0 && hp.x < this.w) {
                chars[hp.y][hp.x] = arrowHeadChar(points, !reversed);
            }
        }

        return chars;
    }

    getMinSize() { return { minW: 2, minH: 1 }; }

    getEditableProps() {
        return [
            ...super.getEditableProps(),
            { key: 'flipped', label: 'Flip', type: 'select', options: ['false', 'true'], propsBased: true },
            { key: 'reversed', label: 'Reverse', type: 'select', options: ['false', 'true'], propsBased: true },
        ];
    }
}

// === Table Component: multi-column grid ===
class TableComponent extends BaseComponent {
    constructor(x, y, w, h, props = {}) {
        super('table', x, y, w || 24, h || 7, props);
        this.props.cols = props.cols || 3;
        this.props.rows = props.rows || 3;
        this.props.headers = props.headers || ['Col1', 'Col2', 'Col3'];
    }

    render() {
        const chars = [];
        for (let r = 0; r < this.h; r++) {
            chars.push(new Array(this.w).fill(' '));
        }
        if (this.w < 5 || this.h < 4) return chars;

        const bc = BORDER_CHARS[this.borderStyle] || BORDER_CHARS.single;
        // Clamp cols so each column is at least 3 chars wide (border + 1 char + border)
        const maxCols = Math.max(1, Math.floor((this.w - 1) / 3));
        const numCols = Math.min(Math.max(1, this.props.cols), maxCols);
        const colWidth = Math.floor((this.w - 1) / numCols);
        const numRows = Math.max(1, this.props.rows);
        const rowHeight = 2; // each data row = 1 content line + 1 divider line

        // Draw outer box
        drawBox(chars, 0, 0, this.w, this.h, this.borderStyle);

        // Vertical dividers (full height)
        for (let c = 1; c < numCols; c++) {
            const cx = c * colWidth;
            if (cx > 0 && cx < this.w - 1) {
                drawVDivider(chars, cx, 0, this.h, this.borderStyle);
            }
        }

        // Header row divider at row 2
        if (this.h > 2) {
            drawHDivider(chars, 0, this.w, 2, this.borderStyle);
            // Fix intersections at header divider
            for (let c = 1; c < numCols; c++) {
                const cx = c * colWidth;
                if (cx > 0 && cx < this.w - 1) {
                    chars[2][cx] = bc.cross;
                }
            }
        }

        // Data row dividers
        for (let r = 1; r < numRows; r++) {
            const ry = 2 + r * rowHeight; // header takes rows 0-2, then each data row is 2 high
            if (ry > 0 && ry < this.h - 1) {
                drawHDivider(chars, 0, this.w, ry, this.borderStyle);
                // Fix intersections with vertical dividers
                for (let c = 1; c < numCols; c++) {
                    const cx = c * colWidth;
                    if (cx > 0 && cx < this.w - 1) {
                        chars[ry][cx] = bc.cross;
                    }
                }
            }
        }

        // Fix top-row intersections (tee_down where vertical meets top border)
        for (let c = 1; c < numCols; c++) {
            const cx = c * colWidth;
            if (cx > 0 && cx < this.w - 1) {
                chars[0][cx] = bc.tee_down;
            }
        }
        // Fix bottom-row intersections (tee_up where vertical meets bottom border)
        for (let c = 1; c < numCols; c++) {
            const cx = c * colWidth;
            if (cx > 0 && cx < this.w - 1) {
                chars[this.h - 1][cx] = bc.tee_up;
            }
        }

        // Header text
        const headers = this.props.headers || [];
        for (let c = 0; c < numCols; c++) {
            const cx = c * colWidth + 1;
            const header = headers[c] || `Col${c+1}`;
            placeText(chars, cx, 1, header, colWidth - 1);
        }

        return chars;
    }

    getMinSize() { return { minW: 5, minH: 4 }; }

    getEditableProps() {
        return [
            ...super.getEditableProps(),
            { key: 'cols', label: 'Cols', type: 'number', propsBased: true },
            { key: 'rows', label: 'Rows', type: 'number', propsBased: true },
            { key: 'headers', label: 'Headers', type: 'text', propsBased: true },
        ];
    }
}

// === Modal Component: Card + close button + action row ===
class ModalComponent extends BaseComponent {
    constructor(x, y, w, h, props = {}) {
        super('modal', x, y, w || 30, h || 12, props);
        this.props.title = props.title || 'Modal Title';
    }

    render() {
        const chars = [];
        for (let r = 0; r < this.h; r++) {
            chars.push(new Array(this.w).fill(' '));
        }
        if (this.w < 10 || this.h < 6) return chars;

        drawBox(chars, 0, 0, this.w, this.h, this.borderStyle);
        // Title + close button
        placeText(chars, 2, 1, this.props.title, this.w - 6);
        chars[1][this.w - 3] = '×';
        // Header divider
        drawHDivider(chars, 0, this.w, 2, this.borderStyle);
        // Action row divider (2 rows from bottom)
        const actionRow = this.h - 3;
        if (actionRow > 2) {
            drawHDivider(chars, 0, this.w, actionRow, this.borderStyle);
            // Action buttons — only render if enough width
            const cancelBtn = '[ Cancel ]';
            const okBtn = '[  OK  ]';
            const actionsY = actionRow + 1;
            const btnTotalWidth = cancelBtn.length + okBtn.length + 4;
            if (this.w >= btnTotalWidth) {
                placeText(chars, this.w - btnTotalWidth, actionsY, cancelBtn, cancelBtn.length);
                placeText(chars, this.w - okBtn.length - 2, actionsY, okBtn, okBtn.length);
            } else {
                // Narrow modal: just show OK button if it fits
                if (this.w >= okBtn.length + 3) {
                    placeText(chars, this.w - okBtn.length - 2, actionsY, okBtn, okBtn.length);
                }
            }
        }
        return chars;
    }

    getMinSize() { return { minW: 10, minH: 6 }; }

    getEditableProps() {
        return [
            ...super.getEditableProps(),
            { key: 'title', label: 'Title', type: 'text', propsBased: true },
        ];
    }
}

        this.props.tabs = props.tabs || ['Tab 1', 'Tab 2', 'Tab 3'];
        this.props.activeIndex = props.activeIndex || 0;
    }

    render() {
        const chars = [];
        for (let r = 0; r < this.h; r++) {
            chars.push(new Array(this.w).fill(' '));
        }
        const tabs = this.props.tabs;
        const active = this.props.activeIndex;
        let col = 0;
        for (let i = 0; i < tabs.length && col < this.w; i++) {
            const label = tabs[i];
            if (i === active) {
                const text = `[${label}]`;
                placeText(chars, col, 0, text, this.w - col);
                col += text.length + 1;
            } else {
                placeText(chars, col, 0, label, this.w - col);
                col += label.length + 1;
            }
        }
        // Underline
        if (this.h >= 2) {
            const bc = BORDER_CHARS[this.borderStyle] || BORDER_CHARS.single;
            for (let c = 0; c < this.w; c++) {
                chars[1][c] = bc.h;
            }
        }
        return chars;
    }

    getMinSize() { return { minW: 8, minH: 2 }; }

    getEditableProps() {
        return [
            ...super.getEditableProps(),
            { key: 'tabs', label: 'Tabs', type: 'text', propsBased: true },
            { key: 'activeIndex', label: 'Active', type: 'number', propsBased: true },

}

// === Dropdown Component: [Option ▾] ===
class DropdownComponent extends BaseComponent {
    constructor(x, y, w, h, props = {}) {
        super('dropdown', x, y, w || 14, h || 1, props);
        this.props.value = props.value || 'Option';
    }

    render() {
        const chars = [];
        for (let r = 0; r < this.h; r++) {
            chars.push(new Array(this.w).fill(' '));
        }
        chars[0][0] = '[';
        chars[0][this.w - 1] = ']';
        // Value text
        const val = this.props.value;
        placeText(chars, 1, 0, val, this.w - 4);
        // Down arrow
        chars[0][this.w - 2] = '▾';
        return chars;
    }

    getMinSize() { return { minW: 5, minH: 1 }; }

    getEditableProps() {
        return [
            ...super.getEditableProps(),
            { key: 'value', label: 'Value', type: 'text', propsBased: true },
        ];
    }
}

// --- components/progress.js ---
// === Progress Component: [████░░] 50% ===
class ProgressComponent extends BaseComponent {
    constructor(x, y, w, h, props = {}) {
        super('progress', x, y, w || 16, h || 1, props);
        this.props.value = props.value !== undefined ? props.value : 50;
    }

    render() {
        const chars = [];
        for (let r = 0; r < this.h; r++) {
            chars.push(new Array(this.w).fill(' '));
        }
        const pct = Math.max(0, Math.min(100, this.props.value));
        const label = ` ${pct}%`;
        const barW = this.w - label.length - 2; // account for [ ] and label
        if (barW < 1) return chars;

        const filled = Math.round(barW * pct / 100);
        let bar = '[';
        for (let i = 0; i < barW; i++) {
            bar += i < filled ? '█' : '░';
        }
        bar += ']' + label;
        placeText(chars, 0, 0, bar, this.w);
        return chars;
    }

    getMinSize() { return { minW: 8, minH: 1 }; }

    getEditableProps() {
        return [
            ...super.getEditableProps(),
            { key: 'value', label: 'Value %', type: 'number', propsBased: true },
        ];
    }
}

// --- components/pagination.js ---
// === Pagination Component: < 1 [2] 3 > ===
class PaginationComponent extends BaseComponent {
    constructor(x, y, w, h, props = {}) {
        super('pagination', x, y, w || 16, h || 1, props);
        this.props.pages = props.pages || 5;
        this.props.current = props.current || 1;
    }

    render() {
        const chars = [];
        for (let r = 0; r < this.h; r++) {
            chars.push(new Array(this.w).fill(' '));
        }
        const total = Math.max(1, this.props.pages);
        const current = Math.max(1, Math.min(total, this.props.current));
        let text = '< ';
        for (let i = 1; i <= total; i++) {
            if (i === current) {
                text += `[${i}] `;
            } else {
                text += `${i} `;
            }
        }
        text += '>';
        placeText(chars, 0, 0, text, this.w);
        return chars;
    }

    getMinSize() { return { minW: 7, minH: 1 }; }

    getEditableProps() {
        return [
            ...super.getEditableProps(),
            { key: 'pages', label: 'Pages', type: 'number', propsBased: true },
            { key: 'current', label: 'Current', type: 'number', propsBased: true },
        ];
    }
}

// --- components/circle.js ---
class CircleComponent extends BaseComponent {
    constructor(x, y, w, h, props = {}) {
        super('circle', x, y, w || 12, h || 7, props);
    }

    render() {
        const chars = [];
        for (let r = 0; r < this.h; r++) {
            chars.push(new Array(this.w).fill(' '));
        }

        const w = this.w;
        const h = this.h;

        if (w < 3 || h < 3) return chars;

        const cx = (w - 1) / 2;
        const cy = (h - 1) / 2;
        const rx = (w - 1) / 2;
        const ry = (h - 1) / 2;

        for (let r = 0; r < h; r++) {
            const yNorm = (r - cy) / ry;
            if (Math.abs(yNorm) > 1) continue;

            const xSpan = rx * Math.sqrt(1 - yNorm * yNorm);
            const left = Math.round(cx - xSpan);
            const right = Math.round(cx + xSpan);

            if (r === 0 || r === h - 1) {
                // Top and bottom: use '-'
                for (let c = left; c <= right; c++) {
                    _safeSet(chars, r, c, '-');
                }
            } else {
                // Determine character based on slope
                const yAbove = (r - 0.5 - cy) / ry;
                const yBelow = (r + 0.5 - cy) / ry;
                const xAbove = Math.abs(yAbove) <= 1 ? rx * Math.sqrt(1 - yAbove * yAbove) : 0;
                const xBelow = Math.abs(yBelow) <= 1 ? rx * Math.sqrt(1 - yBelow * yBelow) : 0;

                const slope = xAbove - xBelow;

                let leftChar, rightChar;
                if (Math.abs(slope) < 0.3) {
                    leftChar = '|';
                    rightChar = '|';
                } else if (r < cy) {
                    leftChar = '/';
                    rightChar = '\\';
                } else {
                    leftChar = '\\';
                    rightChar = '/';
                }

                _safeSet(chars, r, left, leftChar);
                _safeSet(chars, r, right, rightChar);
            }
        }

        return chars;
    }

    getMinSize() {
        return { minW: 5, minH: 3 };
    }

    getEditableProps() {
        return super.getEditableProps();
    }
}

// --- components/group.js ---
// === Group Component: container for grouped components (MkGroup/DeGroup) ===

class GroupComponent extends BaseComponent {
    constructor(x, y, w, h, props = {}) {
        super('group', x, y, w, h, props);
        this.children = [];
    }

    render() {
        const chars = [];
        for (let r = 0; r < this.h; r++) {
            chars.push(new Array(this.w).fill(' '));
        }

        // Sort children by zIndex ascending, composite into local buffer
        const sorted = [...this.children].sort((a, b) => a.zIndex - b.zIndex);
        for (const child of sorted) {
            const rendered = child.render();
            if (!rendered) continue;
            const offX = child.x - this.x;
            const offY = child.y - this.y;
            for (let r = 0; r < rendered.length; r++) {
                const localRow = offY + r;
                if (localRow < 0 || localRow >= this.h) continue;
                for (let c = 0; c < rendered[r].length; c++) {
                    const localCol = offX + c;
                    if (localCol < 0 || localCol >= this.w) continue;
                    const incoming = rendered[r][c];
                    if (incoming !== ' ') {
                        const existing = chars[localRow][localCol];
                        chars[localRow][localCol] = (existing !== ' ')
                            ? mergeLineChars(existing, incoming)
                            : incoming;
                    }
                }
            }
        }
        return chars;
    }

    getMinSize() { return { minW: 1, minH: 1 }; }

    serialize() {
        const data = super.serialize();
        data.children = this.children.map(c => c.serialize());
        return data;
    }

    applyData(data) {
        super.applyData(data);
        if (data.children && Array.isArray(data.children)) {
            this.children = data.children.map(d => ComponentRegistry.deserialize(d));
        }
    }

    getEditableProps() {
        return [
            { key: 'x', label: 'X', type: 'number' },
            { key: 'y', label: 'Y', type: 'number' },
            { key: 'w', label: 'W', type: 'number' },
            { key: 'h', label: 'H', type: 'number' },
        ];
    }

    // Override setProp to shift children when group position changes
    setProp(key, value) {
        if (key === 'x' || key === 'y') {
            const numVal = parseInt(value, 10) || 0;
            const delta = numVal - this[key];
            this[key] = numVal;
            for (const child of this.children) {
                child[key] += delta;
            }
            return;
        }
        super.setProp(key, value);
    }
}

// --- components/registry.js ---
// === Component Registry: factory + deserialization ===

const ComponentRegistry = {
    _types: {},

    register(type, cls, defaults) {
        this._types[type] = { cls, defaults };
    },

    create(type, x, y, props = {}) {
        const entry = this._types[type];
        if (!entry) throw new Error(`Unknown component type: ${type}`);
        const d = entry.defaults;
        return new entry.cls(x, y, d.w, d.h, { ...d.props, ...props });
    },

    deserialize(data) {
        const entry = this._types[data.type];
        if (!entry) throw new Error(`Unknown component type: ${data.type}`);
        const comp = new entry.cls(data.x, data.y, data.w, data.h, {
            borderStyle: data.borderStyle,
            name: data.name,
            ...data.props,
        });
        comp.applyData(data);
        return comp;
    },

    getTypes() {
        return Object.keys(this._types);
    },

    getDefaults(type) {
        const entry = this._types[type];
        return entry ? entry.defaults : null;
    },
};
